body:
  text: 訂訛雜録卷五青浦胡鳴玉撰漢壽亭侯古有亭侯之封乃侯爵之最下者漢桓帝紀封單超等五人為縣侯尹勳等七人為亭侯列傳中為亭侯者甚多亭有一字名者如獻帝建安初封曹操為費亭侯是也亭有二字名者如靈帝以解犢亭侯入繼是也又楚漢春秋高祖封許負為鳴雌亭侯魏封蘇林為安成亭侯孟康為廣陵亭侯吳封韋昭為高陵亭侯關公之為漢壽亭侯即其類亭曰漢壽二字名也史延熙十四年費禕音衣北屯漢壽景耀元年詔漢中兵屯漢壽是其地今為廣元縣屬四川保寧府世人稱為壽亭侯誤以漢字屬音竹上容齊隨筆云荆門玉泉關將軍廟中有壽亭侯印一紐其上大環徑四寸下連四環皆系於印上相𫝊云紹興中洞庭漁者得之入於潭府以為關雲長封漢壽亭侯此其故物也故以歸之廟中南雄守黃兌見臨川興聖院僧惠通印圖形為作記而復州寶相院又以建炎二年因伐木於三門大樹下土中深四尺餘得此印其環并背俱有文云漢建安二十年壽亭侯印今留於左藏庫邵州守黃沃叔啓慶元二年復買一紐於郡人張氏其文正同只缺五系環耳豫以為皆非真漢物且漢壽乃亭名既以封雲長不應去漢字又其大比它漢印幾倍之聞嘉興王仲言亦有其一侯印一而已安得有四雲長以四年受封當即刻印不應在二十年尤非也是特後人為之以奉廟祭其數必多今流落人間者尚如此也玉案今世所傳三國志通俗演義謂曹操始鑄壽亭侯印授公公不受及加漢字乃受此說出自俚俗豈足據哉曽見名流一記作漢壽侯節去亭字蓋明乎此也漢壽侯生辰普天下以五月十三日為關公生辰豫案漢壽亭侯祖系記錢塘馮景山公著康熙戊午解州守王朱旦濬井得侯壙磚因作關侯祖墓碑記其間載侯之祖考兩世諱字生卒甲子甚詳侯祖石磐公諱審字問之和帝永元二年庚寅生居解州常平村寶池里公沖穆好道以易春秋訓其子卒於桓帝永壽二年丁酉享年六十八子諱毅字道逺性至孝父殁廬墓三年既免喪於桓帝延熹三年庚子六月二十四日生侯侯長娶胡氏於靈帝光和元年戊午五月十三日生子平其大略如此然則五月十三乃侯子平之生辰非侯生辰也當據此改正鍾離權以漢壽亭侯為壽亭侯誤以漢字屬上已辨之矣唐時仙人鍾離雲房名權與吕嵒同時嘗自稱天下都散漢鍾離權見宣和書譜今人稱漢鍾離此誤以漢字屬下因遂傅㑹以鍾離權為漢將鍾離昧音末與從午未之未音妹不同可笑其妄漢鍾離乃地名非人名少陵元日寄妹詩近聞韋氏妹迎在漢鍾離鍾繇晉鍾繇字元常繇音遙取臯繇陳謨彰厥有常之義故世說載庾公謂鍾㑹曰何以久望卿遙遙不至蓋舉其父諱戲之今讀作由非說見楊升菴集豫案世說晉文帝與二陳共車過喚鍾㑹同載即駛車委去比出已逺既至因嘲之曰與人期行何以遲遲望卿遙遙不至㑹答曰矯然懿實何必同羣帝復問㑹臯繇何如人答曰上不及堯舜下不逮周孔亦一時之懿士劉孝標注云二陳騫與泰也㑹父名繇故以遙遙戲之騫父名矯帝父諱懿泰父羣祖父實故以此酬之王世懋云今人呼鍾元常名類作由音觀此定當呼遙又案世說景王嘲鍾育曰臯繇何如人對曰古之懿士則鍾繇讀遙無疑也升菴謂庾公嘲鍾會偶然失檢耳涪翁涪音浮水名州名人但知黃山谷謫居涪州自號涪翁不知二字已見於後漢書郭玉傳初有老父不知何出常漁釣於涪水因號涪翁酇侯資暇録云漢相蕭何封為酇侯舉代呼為鹺侯有呼贊者則反掩口而嘻深可訝也鄒氏分明云屬沛郡者音嵯屬南陽者音贊又茂陵書曰蕭何國在南陽合二家之說音贊不音鹺明矣又野客叢書云酇有二地名屬南陽者音贊屬沛郡者音嵯按茂陵書曰蕭何國在南陽是則蕭何封贊明矣而沛有泗水亭班固銘曰文昌四友漢有蕭何序功第一就封於酇誤以為沛地之嵯矣楊巨源詩曰請問漢家功第一麒麟閣上識酇侯姚合詩曰酇侯宅過謙賈島詩曰往歲酇侯鎮諸家皆承此謬劉晏歲輸至天子曰卿朕酇侯也唐書釋文酇南陽縣名則旰切此正得之玉又考老學菴筆記引班固十八侯銘及楊巨源上門下相公詩為證謂酇侯讀嵯未可盡非豫案蕭何始封國音贊光武時子孫續封音鹺唐人詩漢家恩澤問酇侯指何子孫非謂何也則蕭何之為贊侯無疑考亭周櫟園云世以考亭稱朱文公豫癸巳陪巡過建陽宿麻沙見晦菴後人所藏家譜知考亭是黃氏之亭按五季亂黃端子稜隨父禮部尚書入閩音民見建陽山水秀麗遂家焉子稜乃築亭於半山以望其考因名曰考亭文公居近其地世因以考亭稱之以地稱人可也以他人之考稱文公於理甚悖然公在日實無以此稱之者後人誤謬急當改正張翰翰字之義有四羽翰屏翰詞翰又白色易乘馬翰如檀弓戎馬乘翰義雖不同隨韻押用不分平去周平園謂張翰字季鷹是羽翰之翰當作平聲讀後人循習讀去聲皆失音義此論一起世人遂鑿然謂羽翰當平聲屏翰等當去聲豈知詩常武如飛如翰如江如漢則羽翰亦去聲讀嵩高戎有良翰與申伯番番協文賦始躑躅音擲逐於燥吻音憤終流離於濡翰與難端等字協則屏翰詞翰亦平聲讀大凡字有平仄二音通用者不得執一而論平聲豫案唐人詩無以張翰作寒音者如少陵扁舟不獨如張翰皂帽還應似管寧香山鍾儀徒戀楚張翰浪思吳義山越桂留烹張翰鱠蜀薑供煮陸機蓴之類中酒中酒二字始見徐邈𫝊中聖人義如中著之中而音反從平聲樊噲𫝊項羽既饗軍士中酒師古曰飲酒之中也不醒不醉故謂之中義宜從平聲而音乃竹仲反然如唐人下第詩氣味如中酒情懷似别人及濁賢清聖一中之李太白詩醉月頻中聖迷花不事君蘇子瞻詩時復中之徐邈聖無多酌我次公狂君特未知其味耳臣今時復一中之之類止作平聲無仄用者惟野客叢書載齊已栁詩穠低似中陶潛酒軟極如傷宋玉風從漢書注音竹仲反姚福云中酒作去聲於義為長蓋中有中傷之義余謂如用中聖中之之類必宜平聲若用中酒字不妨平仄竝押日知録謂噲傳中酒酒半也猶今人言半席師古解以不醒不醉故謂之中失之矣飛黃騰踏飛黃馬名昌黎詩飛黃騰踏去不能顧蟾蜍俗或誤作騰達且昧飛黃之義故詳之茗艼茗艼即酩酊字世說日暮倒載歸茗艼無所知晉書山簡𫝊同感槩每見博雅之士感慨寫作感槩韓蘇諸公詩文皆然此本之漢游俠𫝊郭解少時隂賊感槩然師古注謂感意氣而立節槩不作慨字解惟莊子至樂篇是其始死也豫獨何能無槩然注槩感觸經心也須麋須麋即鬚眉字荀子非相篇伊尹之狀面無須麋漢書赤眉作赤麋鬚髮作須髮須本面毛字借作相須之須廣韻注云俗作鬚俗從水誤須音誨爛也消搖消搖即逍遙字如記檀弓孔子消搖於門後漢延篤𫝊夕則消搖內階世說韓康伯拄杖前庭消搖之類汨汨之辨昌黎答李翊書當其取於心而注於手也汨汨然來矣汨注音聿案字韻書汨音聿從子曰之曰水流也又奔汨疾貌與汨沒字從日月之日不同今讀骨骨然來誤也又輟耕録載樊宗師絳守居園池記汨汨街衡畦町阡陌間注云汨于筆切音骨非晢晳之辨晢音浙從折從日明也易大有卦明辨晢也亦作晣晳音昔從析從白今從日白色曽㸃字二字音義不同今字書晳亦訓明誤引大有卦辭俗因有明晰清晰等語非也日知録云史記趙世家吾有所見子晣也晣者分明之意易大有象傳明辨晢也即此字音折又音制索隱誤以為鄭子晳之晳騫騫之辨騫字從鳥音軒鳥飛貌杜詩詞華傾後輩風雅靄孤騫韓詩得時方張王竝去聲挾勢欲騰騫皆押元韻今人用飛騫字誤從馬騫音愆馬腹病容齊隨筆亦曽辨之其言曰騫騫二字音義訓釋不同以字書正之騫去乾切注云馬腹縶又虧也今列於禮部韻略下平聲二仙中騫虛言切注云飛貌今列於上平聲二十二元中文人相承以騫騰之騫為軒昻掀舉之義非也其字之下從馬馬豈能掀舉哉閔損字子騫雖古聖賢命名制字未必有所拘泥去聲若如虧少之義則渙然矣其下從鳥則於掀飛之訓為得此字殆廢於今故東坡山谷亦皆押騫字入元韻如時來或作鵬騫𫝊非其人恐飛騫之類特不暇毛舉深考耳唯韓公和侯協律咏筍一聯云得時方張王挾勢欲騰騫乃為得之此固小學瑣瑣尤可以見公之不茍於下筆也嘵譊之辨嘵音囂詩豫維音嘵嘵恐懼告訴意俗讀鐃用作多言意非鐃音當從言譊譊爭言也揚子譊譊之學各習其師皮日休詩譊譊何必頻相仍東坡詩多言譊譊師所呵作呶亦可詩載號載呶栁河東答韋中立書云豈可使呶呶者早暮咈吾耳騷吾心量移詞人作賀升任箋啓用量移字前人曽辨其非而近時日知録言之甚悉曰唐朝人得罪貶竄逺方遇赦改近地謂之量移舊唐書元宗紀開元二十年十一月庚午祀后土於脽音誰上大赦天下左降官量移近處二十七年二月己巳加尊號大赦天下左降官量移近處量移字始見於此李白贈京兆韋參軍量移東陽詩云潮水還歸海流人却到吳相逢問愁苦淚盡日南珠白居易貶江州司馬自題云一旦失恩先左降三年隨例未量移量讀平聲及遷忠州刺史又云流落多年應是命量移逺郡未成官故韓愈自潮州刺史量移袁州有遇赦移官罪未除之句而宋史盧多遜貶崖州詔曰縱經大赦不在量移之限今人乃稱遷職為量移誤矣玉案栁子厚集送薛判官量移送南涪音浮州量移澧州二序中有謫吏優詔近地漸顯等語不特太白樂天諸人詩可徴也朝請朝請音靚漢律春朝曰朝秋曰請二字史漢甚多竝音才姓反然昌黎秋懷詩塵埃慵伺音試候文字浪馳騁尚須勉其頑王事有朝請東坡送程建用詩㑹看金花詔湯沐奉朝請天公不吾欺壽與龜鶴永皆作上聲用似與史漢音注不合後閲野客叢書乃知其故曰今呼朝請郎奉朝請並作上聲僕考漢書朝請其說有二一說漢律諸侯春朝於天子曰朝秋曰請此合從去聲如竇嬰不得朝請王陵竟不朝請之類師古注才姓反又一說奉朝請無定員本不為官位東京罷省三公外戚皇室諸侯多奉朝請奉朝請云者奉朝㑹請召而已故韓退之東坡詩並作上聲押是也受釐釐一音禧與禧同史漢禧皆作釐如祠官祝釐宣音暄說詳第七卷室受釐之類注謂祭祀福胙也宋錢忱伯之妻瀛國夫人正肅公孫女也紹興初隨其姑長公主入謝欽聖向后於禁中先有戚里婦數人在焉俱從后步過受釐殿同行者皆仰視讀釐為離夫人笑於旁曰受禧也蓋取宣室受釐之義耳后喜回顧主曰好人家男女終是别消渴史漢相如傳口吃音吉而善著書常有消渴疾消謂消中之疾杜詩消中日伏枕消中得自由是也素問云多食數溲曰消中即消渴也後漢李通𫝊素有消疾此即相如渴疾俗用作消解其渴意與解酲一例如方秋崖楊梅詩并與文園消午渴不禁越女蹙春山之類謬也少陵詩慣用消渴字新亭舉目風景切茂陵著書消渴長飄零仍百里消渴已三年消渴今如此提擕愧老夫觀其屬對可益明其義矣消渴本雙疊字俗誤為消其渴意此與第一卷所言落魄之弊正同消痟之别野客叢書云周官疾醫四時皆有癘疾春時有痟首疾鄭注痟酸削也司馬相如消渴則所謂消中之疾也痟首消中二疾既異而其字亦自不同後人往往不辨指為一疾鮮有别之者後漢李通素有消疾此正如相如渴疾也太子賢注消中之疾是已乃復引周官為證是以消中痟首為一義以至玉篇唐韻之類皆以消為痟疾惟禮部韻痟字下注酸痟頭痛是為得之張孟押韻注酸痟頭痛又消渴雖明知二疾為不同是認二字為一體矣王說如此李義山詩末至誰能賦中乾欲病痟以消中為痟首亦承此弊雌黃今謂譏議人曰雌黃非也古人寫字用黃紙故以雌黃滅誤以其色相類也顔之推曰讀天下書未遍不得妄下雌黃謂不得以已意擅改書中之字如金銀車之類是也晉王衍善談論錯舉經籍輒隨口改易聽者不覺故謂之口中雌黃以其改易字句如口中塗滅更定非以其譏議也遷鶯小雅伐木丁丁鳥鳴嚶嚶出自幽谷遷于喬木劉賔客嘉話録曰伐木詩竝無鶯字頃試早鶯求友及鶯出谷詩别無證據豈非誤歟又東臯雜録曰鄭箋云嚶嚶鳥聲正文與注皆未嘗及黃鳥白樂天作六帖始類鶯門中又作詩每用之其後多祖述之也玉案楊楨詩軒樹已遷鶯蘇味道詩遷鶯遠聽聞皆在樂天前則誤不自白帖始也洪駒父謂禽經稱鶯鳴嚶嚶要是後人附合豫案義山詩亦慣用遷鶯字如悔逐遷鶯伴誰觀擇虱時朝滿遷鶯侣門多吐鳯才舊居連上苑時節正遷鶯之類折桂郤詵對䇿東堂為天下第一曰臣猶桂林一枝崑山片玉後世遂以登科為折桂如杜詩夢蘭他日應折桂早年知白樂天詩桂折因同樹鷪遷各異年又桂折一枝先許我楊穿三葉盡驚人溫飛卿詩猶喜故人先折桂自憐羈客尚飄蓬之類已屬假借俗更以月中有桂樹謂之蟾宫桂以登科為登蟾宫展轉𫝊㑹博雅之士所勿道也杜詩禮闈曽擢桂憲府舊乘驄孟襄陽詩桂枝如已擢早逐鴈南飛折改為擢與郤語本指便合櫽栝櫽栝正木器揉曲者曰櫽正方者曰栝栝從木本作桰今作括俗以此二字為包括意用非說苑東郭憲問於子貢曰夫子之門何其雜也子貢曰櫽栝之旁多枉木家語外寬而內正自拯於櫽栝之中蘧伯玉之行也荀子構木必將待櫽栝蒸矯然後直二字見處甚多訂訛雜録卷五
