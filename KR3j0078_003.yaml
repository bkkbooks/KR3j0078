body:
  text: 訂訛雜録卷三青浦胡鳴玉撰鄭重鄭重有頻煩殷勤二義不作珍重不敢輕忽解緗素雜記云漢王莽傳然非皇天所以鄭重降符命之意注師古曰頻煩也顔氏家訓云我亦不能鄭重聊舉近世切要以啓寤汝耳此真得漢書之意近沈存中筆談言石曼卿事云他日試使人通鄭重則閉門不納亦無應門者即以鄭重為殷勤又不知何所據而言然不爾曽謂使人通頻煩可乎玉案廣韻鄭字注云鄭重殷勤也故陶靖節集注敘慧逺白蓮社事云靖節與逺公雅素寧為方外交而不願齒社列逺公遂作詩博酒鄭重招致竟不可詘魏志鄭重送汝好物白樂天謝庾順之送紫霞綺詩云千里故人心鄭重皆作殷勤解朱子謂少陵夔州以後詩失之鄭重繁絮是亦頻煩意愀然愀音悄愀然色變也如禮記孔子愀然作色而對莊子孔子愀然變容荀子愀然有以自省赤壁賦愀然正襟危坐之類俗讀秋然讀啾然用作悽愴不樂意非瞿然瞿然驚顧貌瞿音句與平聲音義不同記檀弓曽子聞之瞿然又公瞿然失席亦作懼然漢東方朔傳懼然易容師古曰懼然失守之貌懼音居具反詩良士瞿瞿禮玉藻視容瞿瞿梅梅音義並同兩造兩造音糙周禮大司冦以兩造禁民訟鄭云造至也使訟者兩至周書吕刑兩造具備蔡傳云兩造者兩爭者皆至也周官以兩造聽民訟具備者詞證皆在也案此二字惟讞鞫時得用之俗誤讀兩召用為彼此二人通稱去聲非也千頃陂陂音卑後漢黃憲傳叔度汪汪若千頃陂世説作汪汪如萬頃之陂澄之不清淆之不濁俗用作千頃波誤認為波瀾案漢書字例陂與波通用後漢亦然故於郭林宗傳作千頃波然絶非波瀾之謂豆區釡鐘毛居正曰豆字是古斗字如豆區釜鐘之類後人誤作爼豆之豆讀之又考工記梓人一獻而三酬則一豆矣注豆當為斗釋文音斗下文飲一豆酒同豫謂豆區釜鐘區當讀歐左傳音注自明若豆之為斗人所未知也鐘鍾古通用挑達伴奐挑達輕儇跳躍貌詩挑兮達兮今用作佻達非伴奐間暇之意詩伴音判奐爾遊矣今用作泮渙非寧馨阿堵流俗以佳兒為寧馨以錢為阿堵其實非也容齋隨筆曰寧馨阿堵宋晉間人語助耳後人但見王衍指錢云舉阿堵物却又山濤見衍曰何物老嫗生寧馨兒今遂以阿堵為錢寧馨為佳兒殊不然也前輩詩語言少味無阿堵氷雪相看有此君又家無阿堵物門有寧讀從去聲馨兒其意亦如此宋廢帝之母王太后疾篤帝不往視后怒謂侍者曰取刀來剖我腹那得生寧馨兒觀此豈得為佳顧長康畫人物不點睛曰傳神寫照正在阿堵中猶言此處也劉真長譏殷淵源曰田舍兒強學人作爾馨語又謂桓溫曰使君如馨地寧可戰鬬求勝王導與何充語曰正自爾馨王恬撥王胡之手曰冷如鬼手馨強來捉人臂至今吳中人語言尚多用寧馨字為問猶言若何也劉夢得詩為問中華學道者幾人雄猛得寧馨玉案猶言如是也蓋得其義以寧字作平聲用又野客叢書云今人稱錢為阿堵蓋祖王衍之言也阿堵晉人方言猶言這箇耳王衍當時指錢而為是言非真以錢為阿堵也今直稱錢為阿堵不知阿堵果何物耶且顧長康曰傳神寫照正在阿堵中謝安曰明公何須壁間置阿堵輩殷中軍曰理應在阿堵上此皆言阿堵豈必錢邪此與王子猷以竹為此君之意同裴迪詩曰竹君者是也勍敵勍音擎強也左傳今之勍者皆我敵也又勍敵之人隘而不列俗讀競因誤作徑敵疑丞疑丞俗用作凝丞非尚書大傳古者天子必有四鄰前曰疑後曰丞左曰輔右曰弼又記師保疑丞朱子曰疑字曉不得想止是有疑即問他之意比物比志故曰聖人有金城者比物比志也語出治安䇿林西仲曰衆志成城在城謂之物在人謂之志可以相比制義多用此物此志乃字之誤林説本之如淳注然豫厯檢漢書賈誼傳作比物此志字形相近剞鋭易訛當再覓善本證之纍纍纍借音雷樂記纍纍乎端如貫珠白樂天詩玉敲音厯厯珠貫字纍纍華表鶴歌有鳥有鳥丁令威出家千載今來歸城郭皆是人民非何不學仙冢纍纍唐彥謙詩長陵高闕此安劉袝葬纍纍盡列侯放翁詩還家欲作諸孫贈村路纍纍柿未丹偶拈一二則平聲較音覺然今之作詩者或誤作上聲用藐藐藐一音莫藐藐忽略貌詩誨爾諄諄聽我藐藐匪用為教覆用為虐與既成藐藐深逺貌音眇不同案聽我藐藐朱傳音邈今沿讀眇者以誤邈為眇音耳邈音莫並無眇音説見第一卷貫穿貫穿音串漢司馬遷贊貫穿經傳馳騁古今杜少陵八哀詩貫穿百萬衆貫穿無遺恨栁子厚送易師楊君序論説辨問貫穿上下俗作貫串非近日名流寫作貫丳或疑為串字之訛不知其本於昌黎贈張籍詩試將詩義授如以肉貫丳也丳音産炙肉器姦姦音干與干同犯也如左傳姦王之位姦先王之禮女皆姦之姦國之紀姦時以動吾父再姦王命子父不姦之謂禮之類陸德明並音干又求也史齊世家以漁釣姦周西伯正義曰姦音干又左傳姦絶我好去聲漢書敢挾詐偽以姦名譽陸氏顔氏並音干今讀為艱與姦混用不復知有干音故為厯考之日知録云廣韻姦古顔切私也詐也亦作姧今本誤姧作姦非也姦音干犯也左氏僖公七年傳曰君以禮與信屬音竹諸侯而以姦終之曰子父不姦之謂禮一傳之中二字各出而義不同釋名姦姦也言姦正法也以姦釋姦其為兩字審矣又姦字亦可訓作干祿之干漢書荆燕吳傳齊人田生以畫姦澤史記作干然則姦但與干通用而不可以為姦也著鞭晉劉琨傳與祖逖為友聞祖逖被用謂人曰吾枕去聲戈待旦常恐祖生先去聲我著鞭著音灼置也與著棋同義俗讀如沉著之著非沉著一作玄箸世説王夷甫曰我與王安豐説延陵子房亦超超玄箸劉辰翁云玄箸猶沉著也玉案世説著字皆作箸如箸帽箸屐箸袴之類蓋箸本古著字後世顓作匙箸用而别出著字王世懋曰世説著皆作箸殆不可曉或槩改作著皆未明乎字學也二十八宿二十八宿音肅俗讀秀非古人皆嘗言之容齋隨筆云二十八宿宿音秀若考其義則止當讀如本音嘗記前人有説如此説苑辨物篇曰天之五星運氣於五行所為宿者日月五行之所宿也其義昭然懶真子録云二十八宿謂之二十八舍又謂之二十八次次也舍也皆有止宿之意今韻略乃音秀此何理也焦竑云星宿韻略音秀誤也宿是日月五星之次舍以止宿為義陰符經天發殺機移星易宿地發殺機龍蛇起陸作入聲讀玉謂諸説甚是但援音袁引未至耳案史記天官書云月蝕歲星其宿地飢若亡又云心則內賊亂也列星其宿地憂此最是讀肅明徴以洪文敏羣公之博學而不引以為證豈偶忘之耶然讀為秀者亦有所本但係古人叶韻非本音也昌黎南山詩延延離又屬音竹夬夬叛還遘喁喁魚闖借音寸萍落落月經宿棲音西宿字古亦有叶秀音讀者左思吳都賦思假道於豐隆披重霄而高狩籠烏兔於日月窮飛走之棲宿鼓篋學記入學鼓篋孫其業也注謂擊鼓以召學士發篋以出書籍本自二項今人輒用彈琴鼓篋句誤以鼓為活字與負笈一例繇辭繇音宙占詞也廣韻注云卦兆辭也佩觽集曰繇從䍃從卜從系與繇字有辨經史多誤梓人因讀為爻音而不知其非此字左傳最多如且其繇曰之類陸德明並音直救反又漢文紀卜之兆得大橫占曰大橫庚庚注李奇曰庚庚其繇文也占謂其繇文也師古曰繇音丈救反本作籀籀書也謂讀卜詞潘嶽西征賦既定鼎於郟鄏遂鑽龜而啓繇平失道而來遷繄二國而是祐昌黎南山詩或如龜坼兆或若卦分繇或前橫若剝或後斷若姤放翁詩卜繇兒能測藥方僧為求詩杕杜末章傳云且卜且筮相襲並作合言于繇而皆曰近矣今之習詩經者莫不讀為合言于爻也蛋蛋壇上聲亦作蛋南海􅊂種曰蛋戶以舟楫為家采海物為生且生食之入水能視合浦珠池蚌蛤惟蛋能沒水探取旁人以繩繫其腰動則引而上先炙毳衲熱出水急覆之不然寒栗以死俗以禽卵為蛋不知誤自何時且變文作蛋尤非字書無蛋字宛借音逺委餘編謂通海內名鳥卵曰彈何也案此當作彈丸之彈因其形似而名之是亦一説今廣東有蛋戶音但皆船户也蛋乃蛋字之訛五松事王勉夫曰緗素雜記云史記秦始皇上泰山立石封祠祀下風雨暴至休於樹下遂封其樹為五大夫唐陸贄松詩不羡五株封李商隱有五松驛詩李白序謂風雨暴作五松受職皆言五松事惟荆公詩老松先得大夫封此為得之僕謂黃朝英稽考未至耳非李白之徒謬也按應劭云秦皇逢暴雨得五松因封為五大夫蓋當時大夫係封五株松非一松也是以庾信終南山詩曰水奠三川石山封五樹松五樹松在唐人前已如此言豈謂太白等謬誤朝英但見唐人有此數處用五松事與史記文不合故有是説不知此事已見於應劭所載而唐前人已用之矣玉案勉夫此辨洞悉源流而後世辨證家猶紛紛謂五大夫是秦第九等爵所封並非五株松自詡獨得何見事之晚耶又檢史始皇紀止言休於樹下因封其樹為五大夫並不言松則五松之説亦出自後人臆度未知是否也孤負李陵答蘇武書陵雖孤恩漢亦負德又曰孤負陵心孤負字意必出此或前更有出未可知也杜詩孤負滄洲願韓詩孤負平生心蘇詩莫教孤負竹風涼又杜詩更長燭明不可孤義山詩映書孤志業之類不可殫述總無誤作辜負者即有之係後人傳寫梓刻之訛非元文也辜罪也與孤負意絶不相蒙相提而論相提而論平聲提上聲音弟史竇嬰傳高遂曰相提而論自是明揚主上之過徐廣曰提音徒抵反索隱曰相提猶相抵今俗讀作相題而論是何理也齗齗如也齗音銀史魯世家余聞孔子稱曰甚矣魯道之衰也洙音殊泗之間齗齗如也漢地理志魯瀕洙泗之水其民涉度幼者扶老而代其任俗既益薄長老不自安與幼少相讓故曰魯道衰洙泗之間齗齗如也師古曰齗齗分辨之意徐廣曰幼者患苦長者長者忿愧自守故齗齗爭辭所以為道衰也俗訛作斷斷如也習用不知已非一日雖斷斷字有出而增一如字實為齗齗如也之形訛也校獵校獵之校音效漢成帝紀行幸長楊宫與胡客大校獵如淳曰周禮校人掌王田獵之馬故曰校獵師古曰此校謂以木相貫穿為闌校耳校人職云六廄成校是則以遮闌為義也校獵者大為闌校以遮禽獸而獵取也洪武正韻云闌校音效所以遮獸而獵取之謂之校獵此本於漢書音義别本字韻書誤音計校之校韻府亦誤以校獵作教音俗因認為田獵而較獲多少意傳臚臚音廬並無盧音史叔孫通傳大行設九賔臚句傳蘇林云上傳語告下為臚下傳語告上為句韋昭云大行掌賔客之禮今謂之鴻臚也九賔則周禮九儀也謂公侯伯子男孤卿大夫士也漢依此以為臚傳以次傳令下也臚音閭宛委餘編曰大鴻臚古音為鴻廬今若依古稱當作一笑豫謂讀書識字止求一是不泥今古也剝棗詩八月剝棗剝音朴與撲同今讀博棗非毛注云剝擊也陸德明音普卜切王荆公詩經新解云剝者剝去其皮而進之所以養老也後從蔣山郊步至民家問其翁安在曰去剝棗乃悟前非即具奏乞除去十三字説見容齋隨筆豫謂今人讀博棗雖非本於介甫之解而仍作撲擊義然已不復知有朴音矣劍器渾脫杜少陵詩序云觀公孫氏舞劍器渾平聲脫音駝瀏灕頓挫獨出冠時唐段安節樂府雜録謂劍器是健舞曲名又文獻通考舞部謂劍器古武舞之曲名其舞用女妓雄粧空手而舞案此今人意以劍器為刀劍之器非是舊唐書郭山惲傳中宗引近臣宴集將作大匠宗晉卿舞渾脫胡三省注通鑑長孫無忌以烏羊毛為渾脫氊帽人多效之謂之趙公渾脫因演以為舞容齋隨筆云唐中宗時清河尉吕元泰上書言時政曰比見坊邑相率為渾脫隊楊用修曰渾脫隊即所謂公孫大娘渾脫舞也又居易録云按陳㿩樂書云樂府諸曲自古不用犯聲唐自則天末年劍器入渾脫為犯聲之始劍器宫調渾脫商調以臣犯君故為犯聲又唐多解曲如柘枝用渾脫解之類觀此則劍器渾脫自各為舞曲之名今人誤讀杜詩序以劍器為句而以渾脫瀏灕頓挫六字為句以為皆極贊舞劍器之妙訛謬沿襲文字中往往以渾脫瀏灕四字連綴用之可笑也又云渾脫之義豫向詳之皇華紀聞閲李中麓開先太僕塞上曲一首云黃河萬里障邊隅冒頓年來謀計殊不用輕帆并短棹渾脫飛渡只須臾與朱秉器中丞河上禇談所記略同李自注云脫音駝然後知渾脫舞渾脫帽皆當作平聲也玉謂渾讀平聲人所知也脫之音駝人鮮知之東閣等語漢公孫𢎞傳開東閣以延賢人師古曰閣者小門東向開之避當庭門而引賓客以别於掾史官屬也又朱雲傳且留我東閣以觀四方奇士古人詩文用東閣字本此俗本多傳寫誤梓作閣如少陵詩東閣官梅動詩興義山詩東閣無因得再窺東坡詩東閣郎君懶重尋石湖詩飄零東閣似詩人之類唐制以宣政殿為前殿紫宸殿為便殿前殿謂之正衙天子不御前殿而御紫宸乃自正衙喚仗由閣門而入百官候朝於衙者因隨以入見謂之入閣又門下省以黃塗門謂之黃閣長官曰閣老閣下又太守去聲有鈴閣又閣閣蛙聲昌黎詩蛙黽鳴無謂閣閣祗亂人放翁詩科斗已成蛙閣閣惟前明宫禁有東閣文華閣學士入閣辦事者有內閣閣老閣下之稱明以前無之也今欲執後繩前漢唐詩文東閣閣下盡改為閣惡乎可哉日知録言閣閣之義甚悉詳録第九卷閨閣爾雅小閨謂之閣史遷答任少卿書身為閨閣之臣文翁傳使傳教令出入閨閣注內中小門也今以此二字顓屬女子言非轉作閨閣尤非幕幕音莫俗讀慕誤亦作莫史李牧傳輸入莫府漢李廣傳莫府省文書昌黎晚秋郾城夜會聯句云從軍古云樂談笑青油幕燈明夜觀棋月暗秋城柝此漠音一證也訂訛雜録卷三
