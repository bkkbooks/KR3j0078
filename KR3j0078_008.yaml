body:
  text: 訂訛雜録卷八青浦胡鳴玉撰郢削莊子徐無鬼莊子送葬過惠子之墓顧謂從者曰郢人堊漫其鼻音避端若蠅翼使匠石斫之匠石運斤成風聽而斫之盡堊而鼻不傷郢人立不失容觀此則堊鼻者郢人也斫削者匠石也今人曰郢削郢正郢斤是以匠石之斫屬之郢人大非杜詩脫略磻溪釣操持郢匠斤帶匠字説便不妨此與夢溪筆談所辨郢歌之誤同舉案齊眉屢見辨證書謂舉案之案乃古碗字本於後漢梁鴻傳注豫檢鴻傳無此説何也楊用修謂盤屬近之玉篇云案几屬又食器厯觀載籍並以案對杯言鹽鐵論良民文杯書案神仙傳金案玉杯人皆醉飽東觀記杯案食物大小重疉曺操别傳魏大為人佻至以頭沒杯案中則舉案之為舉盤無疑也顧舉案而必與眉齊今人罕究其義鴻傳云至吳依大家臯伯通居廡下為人賃舂每歸妻為具食不敢於鴻前仰視舉案齊眉則舉案齊眉四字正形其不敢仰視耳若作几案於理不通至以夫婦偕老者為齊眉此尤俚俗假借可笑處不足辨也又漢書霍后傳親奉案上食以婦道共養東觀記魏霸妻奉案前跪皆可相證帙古者以十年為一帙白樂天詩已開第七秩飽食仍安眠又云年開第七秩屈指幾多人是時年六十二元日詩又云行開第八秩可謂盡天年自注時俗謂七十已上為開第八秩案此自六十一至七十俱可稱七帙自七十一至八十俱可稱八帙司馬溫公作慶文潞公八十致語云嵗厯行看九帙新是也後世祝七十夀曰開七帙八十夀曰開八帙非是近見一書謂禮年八十而有秩故稱八十為八帙六十七十不得稱帙其説尤非帙秩帙三字通用六經用字六經之道同歸旨意未嘗不一而用字則有不同者如佑祐右三字一也而在書為佑在易為祐在詩為右惟維唯一也而在書為惟在詩為維在易為唯左傳亦然又如易之無字周禮之法眂薧鮮齍罪漁栗庾閷簭等字他經皆不然今人書無妄無咎多作無失之矣洪文敏之言如此玉幼時聞一老宿云流俗於四書引詩題如止于丘隅魚躍于淵類于字或任意寫作於大非以三百篇止有于字無於字也余始信其説及後細檢毛詩而知其非蓋如言至於漕俟我於城隅作於字處正復不少也于於二字音本不同于羽俱切音盂於央居切音淤人多混讀周禮奇字制義中有寫美為媺者流俗不知或誤讀微案周禮美字皆作媺無作美者他如艱為囏吹為吹法為􅀢並屬周禮字洪文敏曾摘出示人曰六經用字固亦間有奇古者然惟周禮一書獨多豫謂前賢以為此書出於劉歆歆常從揚子雲學作竒字故用以入經如法為法柄為枋邪為邪美為媺呼為呼拜為摻韶為㲈怪為傀暴為暴獨為簎風為飌鮮為鮮稿為薧螺為螺脾為􅀢魚為漁埋為貍吹為吹陔為裓暗為韽柝為柝探為撢翅為翨摘為硩駭為駴擊為轚辜為橭掬為輂羃為幎藻為薻􅉴為叩為叩艱為囏魅為魅與夫庮皫胖鱐齍視劀酏栗臡箈鬻柶絼疈爂㯺􅉧之類皆他經鮮用豫前已書之而不詳悉若考工記之字又不可勝載也烏鬼野客叢書云老杜詩家家養烏鬼玉案續筆談曰養讀從去聲説者不一懶真子以為豬蔡寬夫以為烏野七神冷齋夜話以為烏蠻鬼沈存中筆談緗素雜記漁隱叢話陸農師埤雅以為鸕鷀四説不同惟冷齋之説為有據觀唐書南蠻傳俗尚巫鬼大部落有大鬼主百家則置小鬼主一姓白蠻五姓烏蠻所謂烏蠻則婦人衣黑繒白蠻婦人衣白繒又以驗冷齋之説劉禹錫南中詩亦曰淫祀多青鬼居人少白頭又有所謂青鬼之説蓋廣南州峽諸蠻之流風故當時有青鬼烏鬼等名杜詩以黃魚玉案黃魚即今之鱘鰉魚俗以石首魚為黃魚非對烏鬼知其為烏蠻鬼也審矣然觀元微之詩曰鄉味尤珍蛤家神悉事烏又曰病賽烏稱鬼巫占瓦代龜注南人染病竸賽烏鬼此説又似不同據南蠻傳烏即烏黑之烏而元詩以蛤對烏則以為烏鴉之烏玉案續筆談謂夔峽居人相率十百為曺設牲酒於田間衆操兵仗羣噪而祭謂之養鬼言烏蠻戰殤多與人為厲每嵗以此禳之此説與冷齋合與初説鸕鷀不同杏壇今夫子廟庭中有壇石刻曰杏壇闕里志杏壇在殿前夫子舊居非也杏壇之名出自莊子莊子曰孔子遊乎緇帷之林坐乎杏壇之上弟子讀書孔子弦歌鼓琴奏曲未半有漁父者下船而來須眉交白被髮揄袂行原以上距陸而止左手據膝右手持頤以聽曲終又曰孔子乃下求之至於澤畔方將杖拿而引其船顧見孔子還鄉而立孔子反走再拜而進又曰客乃刺音戚船而去延緑葦間顏淵還車子路授綏孔子不顧待水波定不聞拿音而後敢乘司馬彪曰緇帷黑林名也杏壇澤中高處也莊子書凡述孔子皆是寓言漁父不必有其人杏壇不必有其地即有之亦在水上葦間依陂音卑旁渚之地不在魯國之中也明矣今之杏壇乃宋乾興間四十五代孫道輔增修祖廟移大廟於後因以講堂舊基甃石為壇環植以杏取杏之名名之耳説夲日知録帶礪今人以如帶如礪為開國鴻規河山鞏固意非也史漢功臣表封爵之誓曰使黃河如帶史記無黃字泰山如厲同礪國以永寧爰音袁及苖裔應邵曰封爵之誓國家欲使功臣傳祚無窮也帶衣帶厲砥音止厲石也河當何時知衣帶山當何時如厲石言如帶厲國猶永存以及後世子孫也執牛耳盟用牛耳卑者執之尊者蒞之鄟澤之盟衛侯請執牛耳發陽之役衛石魋蒙之盟魯孟武伯皆小國執牛耳惟鄫衍之役吳以大國執之不合盟禮故孟彘不從今以執牛耳為主盟非是説見池北偶談豫案周禮戎右贊牛耳桃茢鄭司農云贊牛耳春秋傳所謂執牛耳者盟割牛耳盛以珠盤尸􅉀者執之又注牛耳無竅盟於神故以不聽為戒也孫公談圃云王荆公解周禮言取以順聽不知牛有耳而無竅本以鼻音避聽或牽一牛示之公曰然何恙不已容齋隨筆云公孫𢎞為丞相以病歸印上報曰君不幸罹霜露之疾何恙不已顔師古注恙憂也何憂於疾不止也禮部韻略訓恙字亦曰憂也初無訓病之義蓋云罹疾矣不應復去聲云病師古之説最為明白而世俗相承問人病為貴恙謂輕者微恙心病為心恙風疾為風恙根著已深無由可改玉案石奮傳萬石君尚無恙注云恙憂病也賈誼傳令此六七公者皆無恙注云無恙言無憂病也國策嵗亦無恙耶注亦云恙憂也二字見處甚多總無一作病字解者近世字書亦能辨之一二三與一二叄同隨筆云古書及漢人用字如一之與一二之與二三之與叄其義皆同鳴鳩序刺不一也又云用心之不一也而正文其儀一兮表記節以一惠注言聲譽雖有衆多者節以其行一大善者為諡耳漢華山碑五載一巡狩祠孔廟碑恢崇一變祝睦碑非禮一不得犯而後碑云非禮之常一不得當則與一通用也孟子市價不二趙岐注云無二賈者也本文用大二字注用小二字則二與二通用也易繫辭傳參天兩地釋文云參七南反又如字音三周禮設其參注參謂卿三人則三參通用也九之與久十之與拾百之與柏亦然玉案經史中一二叄與一二三通用處觸目皆是昔人謂後世官府簿書文移防胥吏作姦改易數目因以小一字為大一字其實自一至拾皆屬借用字其説非是訓故豫嘗寫訓詁作訓故一友疑誤字不知古止有訓故字後世乃作訓詁漢藝文志魯申公為詩訓故而齊轅固燕韓生皆為之傳故詩有魯故二十五卷韓故三十六卷齊后氏故二十卷齊孫氏故二十七卷師古曰故者通其指義也又劉歆傳初左氏傳多古字古言學者傳訓故而已師古曰故謂指趣也又儒林傳訓故大義九拜百拜野客叢書云古者拜禮非特首至地然後為拜也凡頭俯膝屈手動皆謂之拜按周禮辨九拜之儀一稽音啓首二頓首三空首四振動五吉拜六凶拜七竒音基拜八褒本音包此應讀報拜九肅拜注稽首拜頭至地也頓首拜頭叩地也空首拜頭至手也振動以兩手相擊也竒拜一拜也褒拜再拜也肅拜但俯下手即今之揖也何嘗専以首至地為拜邪乃知禹聞善言則拜如揖之類是也豈僕僕之謂哉今人或以頓首於卑下不知拜頭叩地豈卑下之所安乎日知録云百拜字出樂記古人之拜如今之鞠躬故通計一席之間賓主交拜近至於百注云一獻士飲酒之禮百拜以喻多是也徐伯魯曰按鄉飲酒禮無百拜此甚言之耳若平禮止是一拜再拜即人臣之於君亦止再拜孟子以君命將之再拜稽首而受是也禮至未世而繁自唐以下即有四拜大明會典四拜者百官見東宫親王之禮見其父母亦行四拜禮其餘官長及親戚朋友相見止行兩拜禮是四拜惟於父母得行之今人書狀動稱百拜何也又云古人未有四拜之禮戰國策蘇秦路過雒陽嫂蛇行匍伏四拜自跪而謝此四拜之始蓋因謝罪而加拜非禮之常也黃庭經十讀四拜朝太上亦是加拜今人上上聲父母書用百拜亦為無理若以古人之拜乎則古人必稽首然後為敬而百拜僅賓主一日之禮非所施於父母若以今人之拜乎則天子止於五拜而又安得百也此二者過猶不及明知其不然而書之此以偽事其親也洪武三年上諭中書省臣曰今人書劄多稱頓首再拜百拜皆非實禮其定為儀式令人遵守於是禮部定儀凡致書於尊者稱端肅奉書答則稱端肅奉復敵己者稱奉書奉復上之與下稱書寄書答卑幼與尊者則曰家書敬復尊長與卑幼則曰書付某人三古今人用三古誤以為夏商周三代漢藝文志易道深矣文更三聖世厯三古韋昭曰三聖伏羲文王孔子也孟康曰易繫辭傳曰易之興也其於中古乎然則伏羲為上古文王為中古孔子為下古反璧左僖二十三年晉公子重耳及曺僖負羈饋盤飱置璧焉公子受飱反璧今人却餽曰璧本此俗誤為藺相如事見史記亷藺列傳有臣請完璧歸趙語因寫作完謝大非相如紿秦間使懷璧歸趙並非秦之不受璧也相於相於與相與同似俗實雅古人詩文多用之如孔文舉書岸幘廣堂舉杯相於杜詩此行非不濟良友昔相於老矣逢迎拙相於託契饒之類金錯刀張衡四愁詩美人贈我金錯刀金錯刀王莽所鑄錢名漢食貨志王莽居攝變漢制以周錢有子母相權於是更造大錢徑寸二分重十二銖音殊文曰大錢五十又造契刀錯刀其環如大錢身形如刀長二寸文曰契刀五百錯刀以黃金錯其文曰一刀直五千與五銖錢凡四品並行杜詩金錯囊垂罄銀壺酒易賒韓退之詩聞道松醪賤何須吝錯刀玉案韓集無此詩何也皆謂是也藝苑雌黃之説如此繼古叢編謂金錯刀一名而二物錢一也刀二也王莽所造張衡韓杜所云是錢名杜詩熒熒金錯刀濯濯朱絲繩孟襄陽詩美人騁金錯雙手膾鮮鱗是刀名玉又案梅聖俞送蔡駰下第詩云爾持金錯刀不入鵝眼錢名貫今俗但知為刀名而不知為錢名也骰子骰音頭本平聲字白樂天詩碧籌攢采碗紅袖拂骰盤又鞍馬呼教住骰盤喝遣輸吳音呼為豆子非也史范蔡傳博者或欲大投注裴駰曰投投瓊也楊愼曰投即今骰子蓋投具以瓊為之列子云鳴瓊也又續事始曰曺子建制雙六置投子二觀此則投與骰似可通用資暇録乃以骰字為非曰投子者投擲於盤筵之義或作骰案諸家之書骰即股字不音投玉案詩家之書骰皆音頭注云博齒惟集韻有與股通用之説不得遽以投字為正而廢骰字每下愈况莊子知北遊正獲之問於監市履豨也每下愈况言每於至下之處愈可比况他物今用作每况愈下非學官世以學舍為學宫於理亦通然與出處不合漢賈喧傳及太子少長知妃色則入於學學者所學之官也顔師古注云官謂官舍又藝文志易有施孟梁丘京氏列於學官書有歐陽大小夏侯氏立於學官詩有魯齊韓三家列於學官禮有戴德戴聖慶普三家立於學官春秋有公羊榖梁立於學官無有一作學宮者若云頖宫澤宫便無弊弔生不弔死曲禮知生者弔知死者傷知生而不知死弔而不傷知死而不知生傷而不弔今槩曰弔非也俗云弔生不弔死此言實得禮意但誤作世態燠寒生死易心解耳𨝍溝之誤左哀九年秋吳城𨝍溝通江淮杜注於𨝍江築城穿溝東北通射陽湖西北至宋口入淮通糧道也今廣陵韓江是陸德明曰𨝍音寒城𨝍句絶溝通江淮自為一句今俗誤以吳城𨝍溝四字為句遂稱揚州𨝍江為𨝍溝非用史語之失卑之毋甚髙論作二句讀前已詳言之矣兹閲容齋隨筆論史語一則復節録於此曰今之牽引史語者亦未免有失張釋之言便宜事文帝曰卑之毋甚髙論令平聲今可行也遂言秦漢之間事帝稱善顔師古曰令其議論依附時事豫謂不欲使為甚髙難行之論故令少卑之耳而今之語者直以言論不足采為無甚髙論又韓公送諸葛覺往隨州讀書詩云鄴侯家多書插架三萬軸一一懸牙籖新若手未觸為人強記覽過眼不再讀鄴侯蓋謂李繁時為隨州刺史藏書既富且記性警敏故籖軸嚴整如是今人或指言雖名為收書而未嘗過目者輒曰新若手未觸亦非也祝即咒字祝本有竹晝二音六書正訛謂别作咒非余檢經史果然尚書無逸否則厥口詛祝詩大雅侯作音詛侯祝周禮大祝掌六祝一曰順祝二曰年祝三曰吉祝四曰化祝五曰端祝六曰策祝左襄十七年宋國區區而有詛有祝禍之夲也成十七年愛我者唯祝我使我速死無及於難注並音之又反或之秀反又漢書外戚傳宫人飲酒酹地皆祝延之師古曰祝之又反謂祝之使長夀也又張衡西京賦東海黃公赤刀粵祝冀厭白虎卒不能救據此數條祝詛祝頌二義皆可讀皺今但知有竹音耳賈昌朝字音清濁辨之六反祭主贊詞者之又反謂贊詞輔車左僖五年諺所謂輔音釜車相依脣亡齒寒者其虞虢之謂也車陸德眀音尺遮反杜注輔頰輔車牙車林注言虞如牙車如齒在裏虢如輔頰如脣在表二國相須以生去一不可案此則輔車相依脣亡齒寒二句意夲一串若以輔車解作車之輔如詩所謂無棄爾輔意不惟顯背杜林二注且覺取譬不倫名諱曲禮卒哭乃諱韻會注生曰名死曰諱世俗不察向生人輒稱尊諱非禮也然古人已有此失吳楚材強識略言漢西嶽碑云樊君諱毅毅時尚在也又金石録謂生而稱諱見於石刻者甚多因引孝宣元康二年詔曰其更諱詢以為西漢已如此然則俚俗相沿亦有所夲吹噓師資後漢鄭太傳孔公緒清談髙論噓枯吹生太子賢注枯者噓之使生生者吹之使枯言談論有所抑揚也案此則吹噓二字義正相反然古今詞人多混作一意用又儒林傳若師資所承宜標名為識者乃著之云太子賢注引老子曰善人者不善人之師也不善者善人之資也則師資二字亦兼美惡言今人解作師之資二弊雖小不可不知鳯尾諾野客叢書云皮日休詩以鳯尾諾對虎頭嵓東坡以鳯尾諾對虎頭州按晉帝批奏書諾字之尾如鳯尾之形故謂鳯尾諾齊帝令平聲江夏王學鳯尾諾一學即工蓋諾者猶言制可也諾字與詔字相似而又有鳯詔之語故觀者往往誤以為鳯尾詔焉如陸龜蒙集所刋看平聲是也圯上老人圯音移張子房受書於圯上老人楚人謂橋為圯李太白詩我來圯橋上懷古欽英風既曰圯又曰橋後人所以有橋橋之誚案地輿其地至今有圯橋蓋沿訛也字從巳午之巳無鈎不從人己之己圮音痞敗也書方命圮族訂訛雜録卷八
