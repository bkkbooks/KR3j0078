body:
  text: 訂訛雜録卷十青浦胡鳴玉撰雜字音義素王謂孔子素臣謂左丘明王似宜從平聲然杜元凱左傳序云立素王又云仲尼素王陸氏竝音于况反注謂素空也素王無位而王也酗虛去聲以酒為凶曰酗酗酒字本出商書微子篇今俗輒曰凶酒非也亦作䣱趙克國𫝊湯數醉䣱羌人覬覦音計俞希幸也左桓二年民服事其上而下無覬覦漢書叙𫝊絶信布之覬覦俗讀愷喻非倘音敞忽止貌莊子在宥篇雲將見之倘然止贄然立今誤作儻字用侄音質廣韻注云堅也又牢也俗誤作子姪字用脧音宣縮也減也漢書民日朘月削今誤讀俊削史貨殖𫝊天下熙熙皆為利來叶音離天下壤壤皆為利往熙熙和樂也壤壤和緩貌今用作天下攘攘穰穰皆與元文背戾紬繹之紬音抽漢谷永𫝊燕見紬繹以求咎愆師古曰紬讀曰抽紬繹者引其緒也史公自序紬史記石室金匱之書徐廣亦音抽師古於漢書史遷傳又音胄謂綴集之音義俱異紙音止從氏俗從氐誤紙音低廣韻注云絲滓也周書紹聞衣德言衣去聲服之也言繼其所聞服行文王之德言也今人名字多取義焉輒誤呼衣為平聲劇音極甚也理煩治劇又劇談戲劇又姓吳音誤呼為强入聲畹淵上聲音苑田三十畝曰畹騷余既滋蘭之九畹兮又樹蕙之百畝又和婉琰琬宛然類竝音苑俗誤讀碗不可革也眇小也周書眇眇豫末小子莊子德充符眇乎小哉史始以薛公為魁梧然今觀之眇小丈夫耳俗用眇小字誤作渺廣韻注云渺㵿水貌儋石不合作擔漢蒯通𫝊守儋石之祿揚雄𫝊家乏儋石之儲儋罃也瓦器應劭曰受二斛肯綮筋肉結處綮音謦莊子技經肯綮之未嘗與啓音不同胼胝皮厚也史禹手足胼胝胝音支妹喜桀妻妹音末從夲末之末與姊妹之妹從未不同豪釐與毫釐同記經解及易緯皆曰差以豪釐繆以千里釐亦作氂榼堪入聲酒器左傳行人執榼承飲造於子重俗誤讀盒溘堪入聲奄忽也騷寧溘死以流亡兮參差之參借音春與參伍之參音驂異韓昌黎孟生詩諒非軒冕旅應對多差參萍蓬風波急桑榆日月侵藝苑雌黃云古詩押韻或有語顚倒而理無害者如退之以參差為差參以玲瓏為瓏玲是也觀此則參差為春音無疑也關雎之詩參差荇菜參𫝊音初南反人自不察承訛讀驂又音森參商二星名俗亦誤讀驂頁音頡廣韻注云頭也村孰誤作紙葉字用堂亷字出賈誼治安策亷堂之側隅也俗或誤作堂簾牀第牀格也左傳牀第之言不踰閾俗或誤作牀第漢章帝敇三公詔安靜之吏悃愊無華悃愊至誠也愊音壁俗或誤讀悃幅捭闔鬼谷子篇名捭音擺開也闔閉之也俗或誤作押闔內則􅎵瀡以滑之􅎵上聲久泔也瀡雖上聲滑也俗或誤作􅎵髓揚雄解嘲音遭東南一尉西北一候注曰候所以伺音四候逺國來朝之賓亦官也俗或誤作侯尉易繫辭傳故能彌綸天地之道夲義云彌如彌縫之彌有終竟聯合之意綸有選擇條理之意俗或誤作瀰淪詩適子之館兮還豫授子之粲兮今或誤作授餐詩式相好矣無相猶矣猶謀也或誤作相尤左襄十二年夫婦所生若而人杜注不敢譽亦不敢毁故曰若如人案此是亦而如通例若而人猶言如此人俗或誤用作若干人意自堂亷以下諸弊丗年前制義中觸目皆是今能辨之者多矣焯與灼同俗誤讀卓儳音暫表記君子不以一日使其躬儳焉如不終日又曲禮母儳言與左傳鼓儳焉可也音慙義異窋音質不窋失官后稷之子漢有平陽侯曺窋參之子蠕而宣切軟平聲蠕動字出荀子莊子俗讀須非朱提音殊時漢縣名出銀砥音止書𫝊砥細於礪皆磨石也俗於砥厲亷隅中流砥柱周道如砥之類皆誤讀抵觖音决缺也觖望謂不滿所望而怨也史燕世家此獨尚觖望盧綰𫝊羣臣觖望字從夬俗或誤從央因讀為央望闖丑禁反琛去聲公羊傳開之則闖然公子陽生也注出頭貌又窺覘也韓孟聯句儒門雖大啓姦首不敢闖與禁浸等字押俗讀創坊一音防與防同禮坊記以此坊民刑以坊淫又言坊行表荀子作防君子言有壇宇行有防表圜與圓同又圜視驚視也賈誼𫝊天下圜視而起梓人𫝊豫圜視大駭高漸離漸史記正義音子亷反樊於期於宛音苑委餘編讀烏欹音溪不正也亦作敧俗從缺誤欹音伊歎美也最除去聲古聚字今誤為最字嬪音頻婦也書嬪於虞詩曰嬪于京妃嬪婦官名記有九嬪吳音誤呼為擯刊看平聲削也劉歆答揚雄縣諸日月不刋之書言不可削除也後世以此字作梓刻用楊用修深辨其非字從干戈之干與從千百之千不同利音茜切也骩音委古委字屈曲曰骩唐鄭注傳撓音閙骩朝法歐陽公代王狀元謝啓陸機閲史尚靡識於撐犂枚臯屬音竹文徒自成於骩骳橘均入聲非涓入聲敦槃之敦音對周禮玉府若合諸侯則共珠槃玉敦注槃敦類珠玉以為飾珠槃以盛牛耳尸盟音明者執之玉敦㰱血玉器掞音閃舒也選摛音鴟藻掞天庭聞去聲聲達於外也與平聲不同如詩聲聞于天聲聞于野記言聞則入言不聞則不入之類嵇音奚山名叔夜居其側因以為姓俗讀稽蓋姓音閣漢有蓋公治黃老蓋寬饒醒而狂又葉姓應讀攝查姓應讀茶今竝從本音非也晟音盛眀也熾也唐將李晟五代史有孫晟宋朝樂名曰大晟鰓鰓讀徙徙與葸同畏懼貌漢書刑法志鰓鰓常恐天下之一合而共軋已妥帖俗或作妥貼非陸士衡文賦或妥帖而易施韓昌黎薦士詩妥帖力排奡石鼓歌安置妥帖平不頗隲音質定也陰隲評隲吳音誤呼為則苞音包詩竹苞方苞史苞苴亦作包禹貢漸包易繫包桑俗讀袍案此字本婢小反音莩草名漢書有苞履佩觿集曰有以草名之苞為厥包其順非有如此者暴音僕日乾也又顯示也與暴虐侵暴暴殄等音别今人用暴露暴白誤呼庖去聲郤與隙音喫同從阜音邑不從卩音節莊子養生主批大郤導大窾又姓晉有三郤俗誤讀卻卻從卩與却同雹音薄春秋大雨去聲雹苛音何亦作荷漢酈食其傳聞其將皆握齱好荷禮楊用修曰苛小草也今但知為苛刻之苛藐紫草也今但知為藐然之藐藎染草也今但知為忠藎之藎屈姓音九勿反音如掘屬一音竹續也託也如屬文屬客屬書屬和之類六書正訛謂俗作囑非讋占入聲失氣而言也又懼也又人名戰國策左師觸讋村孰誤讀觸龍史記作觸龍瀧音雙奔湍也又水名在韶州樂昌縣昌黎有瀧吏詩歐公有瀧岡阡表又浙江桐廬縣有七里瀧在嚴子陵釣臺之西辟易之辟音僻史項羽本紀人馬俱驚辟易數里謂開張而易其故處又微辟之辟音璧愒音慨左昭元年玩歲而愒日今用玩愒字本此俗或誤讀玩氣口吻音憤亦作吻俗誤呼口忽禊音係祓除惡祭名三月上已俗書巳午字不用鉤挑非祓除不祥蘭亭序云修禊事也錯􅀈音措誤後漢寒朗傳二人錯􅀈不能對注云猶倉卒也錯音七故反㦍音五故反􅀈廣韻作愕岐嶷音逆小兒有知識貌詩克岐克嶷以就口食傳峻茂之貌俗或誤押岐凝樂記易直子諒之心油然生矣朱子曰易直子諒之心一句從來說得無理㑹却因見韓詩外傳子諒作慈良則可無疑矣脞坐上聲叢脞煩碎也書元首叢脞哉俗讀挫非脣舌字從月俗從口誤唇音真廣韻注云驚也百里奚烹伏雌伏浮去聲禽伏卵也俗讀如字非咬齧也俗誤作咬咬音交鳥聲莊子齊物論宎者咬者言風聲之不齊俗書喜加草字如絲麻作麻卧席作席芻蕘作芻蔬果作果蔥韭作韭之類出自俚俗不足為怪文人學士所當戒也訂訛雜録卷十
