body:
  text: 訂訛雜録雜家類二雜考之屬提要臣等謹案訂訛雜録十卷國朝胡鳴玉撰鳴玉字廷佩號吟鷗青浦人嵗貢生乾隆丙辰薦舉博學鴻詞是編皆考訂聲音文字之訛大抵採集諸家說部而參以已說其中有暗合前人如文選神女賦一條謂玉字王字顛倒互寫是矣然始辨其誤者為姚寬西溪叢語申明其義者為張鳯翼文選纂注而鳴玉仍反覆力辨之是未見二說也揚子法言鴻飛冥冥弋人何篡一條鳴玉厯引後漢書逸民傳注陳子昻碑韓愈詩證今本誤篡為慕是矣然今本實作篡不作慕其誤為慕則自張九齡感遇詩孤鴻海上來一首押入遇韻始以為近人所誤則非也龍鍾一條不取竹名石名之說是矣然誤以岑參雙袖龍鍾淚不乾句為常建詩又李匡乂資暇集所解龍鍾之義乃誤指為龍爪泥痕鳴玉未及引駁亦疏漏也雙鯉魚一條駁漢書陳勝𫝊宋書符瑞志魚腹藏書之說是矣然此語始見蔡雍飲馬長城窟行而但引古詩尺素如霜雪叠成雙鯉魚是雍後語非其本也又引蘇武雁足帛書出于詭託為證然烹魚得書雖屬寓言而射雁得書則有郝經之實事陵川集具載始末未可謂之虛詞也凡此偶然失檢時亦有之要其但引古書互相參證不欲多生新意自見所長所以言皆有據所得反較諸家為多狐白之裘固非一腋其網羅薈稡之勤亦未可遽沒也乾隆四十六年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:951d5df2038834c39346709e4726f16802b2057368af2ac185f815f54f9f40c0
