body:
  text: 訂訛雜録卷二青浦胡鳴玉撰野處而不昵昵寅入聲音逸字從日曰相近也與匿字音義迥别國語管子曰野處而不昵其秀民之能為士者必足賴也本於昵字句絶謂野處而不與庸衆相昵此民之秀出而能為士者俗讀昵為匿以野處而不昵其秀七字為句誤為誰野處而能不掩其秀如英英露爽意紕繆甚矣急宜正之詩甫田注云俊士秀民也下引管仲之言為證分野地里志某星分野漢書作壄分去聲今人不知誤讀平聲周禮保章氏以星土辨九州之地所封封域皆有分星以觀妖祥分野者分內之野或繫之北斗如魁主雍去聲或繫之二十八宿音肅如星紀主吳越或繫之五星如嵗星主齊吳之類又有月建分野十干分野十二支分野左僖三十年杜注分野之星昭十八年杜注大辰大火宋分野二十六年杜注出之分野陸德明竝音扶問反又漢地里志有皆趙分皆燕分齊分等語又曰陳鄭之國與韓同星分焉史天官書注索隱曰謂月蝕列星二十八宿當其分地有憂偶拈五六則分非平聲信矣王維終南山詩分野中峰變陰晴衆壑殊以分野對陰晴又李榖詩照耀文星吳分野留連風月晉名賢古人無錯拈者處分等語晉書謝安曰朝廷處分已定矣杜詩明明領處分處分聽平聲人主劉夢得詩停杯處分不須吹分字皆仄用又樂律三分損益隔八相生禮記分無求多分夾而進左傳君其取分焉分之采物四國皆有分漢書分部逐捕古有分土亡分民之類竝音扶問反流俗或不盡知誤讀平聲玉樹世說謝太傅問諸子姪子弟亦何預人事而正欲使其佳車騎答曰譬如芝蘭玉樹欲使其生於階庭耳初不解玉樹為何物後覽野客叢書乃知是槐不覺一快其言曰揚子雲甘泉賦玉樹青蔥顔師古注玉樹武帝所作集衆寶為之向注文選亦謂武帝植玉樹於此宫以碧玉為葉僕案三輔黃圖云甘泉宫北有槐樹今謂玉樹根幹盤峙三二百年木也楊震關輔古語記曰耆老相傳咸以謂此樹即揚雄甘泉賦玉樹青蔥者也又觀隋唐嘉話國史纂異長安記聞見録雜書皆言漢宫以槐為玉樹因知晉人所謂芝蘭玉樹者蓋指此物也又考漢武故事上起甲帳乙帳前庭種玉樹珊瑚為枝碧玉為葉自在神宫中只非甘泉宫事知師古與向之注為甚謬而左思之見未審也吃吃音吉與喫音義迥别漢周昌傳昌為人吃師古曰吃言之難也魯恭王餘韓非揚雄司馬相如鄧艾諸人皆有此病俗混作喫字用非大觀壯觀等語大觀音貫易觀卦大觀在上本義云觀者有以中正示人而為人所仰也豫謂凡視之平聲有以示人使之來觀去聲如左傳觀兵於周禮國語耀德不觀兵漢書觀之珍寶之類又奇觀壯觀舊觀竝應去聲杜詩先朝常宴㑹壯觀已塵埃此一徵也宋王景文詩云直翁自了平生事不了山陰陸務觀放翁見之笑曰我字務觀乃去聲如何把做平聲押了此雖戲語亦可為用字不詳出處者戒直翁謂時相史浩中興中興之中讀衆毛公蒸民詩序云任賢使能周室中興杜元凱左傳序云祈天永命紹開中興陸德明竝音丁仲反杜詩今朝漢社稷新數中興年又萬里傷心嚴譴日百年垂死中興時李義山詩路有論平聲寃謫言皆在中興東坡詩威聲又數中興年二敵行當一矢聨皆本陸音王觀國學林新編云中有鍾衆二音音鍾者當二者之中首尾均也音衆者首尾不必均但在二者之間耳此中興之中所以音衆又如中年中葉中天中塗中詘之類竝當從衆音楊仲𢎞詩一代人才頗中衰此其徵也豫又案漢婁敬傳乃營成周都雒以為此天下中師古音竹仲反知中年中塗類必應讀衆也逢掖記儒行丘少居魯衣逢掖之衣鄭氏曰逢猶大也大掖之衣疏曰謂肘腋之所寬大故鄭云大袂襌衣也後世用作縫掖非柳子厚上大理崔大卿啓徒爾拖逢掖曵大帶又答貢士元公瑾書逢掖之列亦以加慕注皆引禮記鄭氏之說釋之良是薄暮薄暮之暮音博迫也侵也他如薄人於險外薄四海之類俱與厚薄音義不同尚書劉熙釋名曰尚書者何也尚上也言最在上總領之也尚書孔穎達正義曰尚者上也言此上代以來之書故曰尚書是官名與書名竝應去聲杜子美題瀼囊上聲西新賃草屋詩欲陳濟世策已老尚書郎元自仄用豫見辨證書莫不以尚書謂應讀上而不引此詩為證何也孔平仲珩璜新論云尚書與尚食尚公主同而世俗相承以平聲呼誤矣夢溪筆談云官名中尚書本秦官尚音上謂之尚書者秦人音也至今秦人謂尚為常宛借音逺委餘編曰尚書之尚不知後世何以作平聲元美蓋未見存中之說耳輟耕録秦時少府遣史仕殿主發書故謂尚書尚主也如尚衣尚食並時亮反以是藐諸孤左僖九年晉獻公謂荀息曰以是藐諸孤辱在大夫其若之何杜注言其幼賤與諸子縣殊幼賤貼是字指奚齊諸子貼諸孤謂羣公子縣殊解藐字言此幼賤之奚齊縣絶於諸子之貴長義本如是若以藐為眇小意則孤字應指奚齊諸字將作何解天下有是句法乎今人裂取藐諸孤三字作孤子眇小用沿襲已久不覺其非藐陸德明音妙小反又亡角反去之夫左宣二年華元曰去之夫其口衆我寡夫如字讀去之夫三字為句林唐翁注云言此役夫今以去之二字為句絶夫讀扶誤連下句案左傳夫應讀扶陸氏必音此獨無之故知林說為不易一臠臠連上聲塊切肉一臠禁臠字出晉書謝混傳俗讀為鸞非也杜詩禁臠去東床趨庭赴北堂義山詩南朝禁臠無人近瘦盡瓊枝咏四愁東坡老叨賦嘗項上之一臠嚼霜前之兩螯音翺放翁詩秋日留連野老家朱盤鮓臠粲如花無作平聲用者若音鸞是病瘠貌說文引詩棘人欒欒作臠臠近時字書謂禁臠一臠宜讀鸞彼蓋未見杜李諸公之詩耳苐第之辨苐音題廣韻作苐注云草也莊子道在苐今本作梯稗俗讀第作但字解非但義當作第如漢書第令無斬第出僞遊雲夢第俱如臨卭第言之汝第往之類亦作弟從無作苐者今人亦漸能辨之為勸學死世說蔡司徒渡江見彭蜞大喜曰蟹有八足加以二螯令平聲烹之既食吐下委頓方知非蟹後向謝仁祖說此事謝曰卿讀爾雅不熟幾為勸學死劉孝標注大戴禮勸學篇曰蟹二螯八足非蛇蟺之穴無所寄託者用心躁也故蔡雍作勸學章取義焉爾雅曰螖蠌音滑澤小者蟧即彭蜞也似蟹而小今彭蜞小於蟹而大於彭螖即爾雅所謂螖蠌也然此三物皆八足二螯而狀甚相類蔡謨不精其小大食而致弊故謂讀爾雅不熟也玉案荀子亦有勸學篇作六跪二螯與大戴禮少異謝蓋謂蔡不精爾雅而徒信勸學篇二螯八足之言幾為其所誤而致死也幾為勸學死坊本類書作勤學韻府亦然世俗仍訛用之非也野客叢書最稱博洽亦曰蔡謨讀爾雅不精誤食蟛蜞取後世譏為勤學者之誚乃知此誤其來尚矣仰字去聲用仰一讀去聲仗也資也與俯仰音義不同史平準書衣食皆仰給縣官封君皆低首仰給既云低首仰非上聲益信也漢胸奴傳以衣食異無仰於漢公孫𢎞傳故人賓客皆仰衣食亦作卬如東方朔傳萬民所卬足也鄭當時傳卬奉賜給諸公王莽傳物物卬市日闋亡儲之類師古竝音牛向反又杜詩家貧仰母慈韓詩舉族仰薄宦今上官文移必曰仰某官準俗作准此若作上聲於義不通孔平仲雜說云今公家文字用仰字出北史北齊孝昭紀詔定三恪康入聲禮儀體式亦仰議之賈昌朝字音清濁辨上聲下瞻上也去聲上委下也蒼黃人謂匆遽失措曰倉皇若作蒼黃必嗤為别字然古人集中如少陵新㛰别詩誓欲隨君去形勢反蒼黃入衡州詩無論再繾綣已是安蒼黃昌黎祭女拿文值音稚吾南逐蒼黃分散栁河東韋道安詩蒼黃見驅逐誰識死與生又答韋中立書數州之犬皆蒼黃吠噬之類無作倉皇者至宋人始作倉皇如歐陽公五代史伶官傳序云倉皇東出之類北山移文始終參差蒼黃反覆以蒼黃對始終是另為一義不指匆遽言近見杜詩注於新㛰别引此為證非也不一而足不一而足語出公羊襄公二十九年傳又見文公九年言不以一事之美而遽足之見待之嚴也故下文有季子者所賢也曷為不足乎季子等語今人用作事非一次意開口即是不覺其非卑之母甚高論史張釋之傳釋之既朝畢因前言便宜事文帝曰卑之母甚高論令今可施行也於是釋之言秦漢之間秦所以失而漢所以興者久之文帝稱善乃拜釋之為謁者僕射音夜卑之母甚高論謂少貶其辭母為甚高之論俗改毋為無將卑之二字連下讀用作議論不足采意非豫訂此條後閲王勉夫野客叢書曰今人以卑之無甚高論卻所說之卑者甚失當時之意蓋文帝懼釋之陳五帝三王上古久逺之事無益於時故令陳今可行之說釋之遂言秦漢之事文帝所以稱善則卑之無甚高論自是兩句今人作一句讀之所以失當時之意也此說先得我心但亦改母為無雖母無字古通用然史漢元文竝作毋是禁止之辭不得輒易也繼更見容齊四筆亦言之録在第八卷乃知字句之訛古今所同也睅睅戶板切音近緩廣韻注云目出貌左傳睅其目皤其腹韓文鱷魚睅然不安溪潭世俗古文選本或作悍然又或音悍皆誤也何居誰居何居音基語助也記檀弓何居乎吾未之前聞莊子齊物論何居乎形固可使如槁木心固可使如死灰乎誰居猶言誰歟左襄二十三年國有人焉誰居其孟椒乎陸德明曰居音基詩日居月諸居諸亦語助字合從基音人不之知也惟記郊特牲二日伐鼓何居當如字讀斤斤斤斤音僅詩斤斤其明毛傳明察也又重慎也後漢吳漢傳斤斤謹質形於體貌二字人所習用而昧於出處不知應讀去聲也丈人行等語輩行杭去聲與行行如也音同蘇東坡哭任遵聖詩老任况奇逸先子推輩行文章得少譽詩語尤清壯漢蘇武傳漢天子我丈人行師古曰行音胡浪反杜詩王孫丈人行垂老見飄零注家謂行叶音巷漢書既明翻胡浪安得謂叶又云豈如一作知吾甥不流宕丞相中郎丈人行小杜詩再拜宜同丈人行過庭交分有無同皆仄用近時一名流梅花與桃李並開詩云李桃不言惟解笑都忘渠是丈人行押入陽韻誤也又史孝武紀老人為兒時從其大父行識其處漢鄭當時傳自見年少官薄然其知友皆大父行衛霍傳斬單于大父行籍若侯産仲父亞父仲父楊倞曰仲者夷吾之字父事之故號為仲父漢高紀亞父范增如淳曰亞次也尊敬之次父猶管仲為仲父玉案史記呂不韋為相國號稱仲父後秦王賜書曰君何親於秦號稱仲父以仲父為親則為父子之父無疑也又尚父亦應如字鄭康成曰可尚可父也故詩傳於古公亶父皇父卿士類音甫維師尚父獨無音冗長冗長音仗義與剩賸同陸士衡文賦雖區分之在兹亦禁邪而制放要辭達而理舉故無取乎冗長謂文之冗雜餘長也杜詩官聨辭冗長行路徙敧危昌黎詩自古澄不清環混無歸向炎風日搜攪幽怪多冗長香山詩通州海內悽惶地司馬人間冗長自注去聲官東坡謂范淳夫講書無一冗字無一長句歷觀諸則音義曉然俗用此二字誤為長短之長射覆射覆音食福漢東方朔傳上嘗使諸數家射覆師古曰於覆器之下而置諸物令暗射之故云射覆覆音方目反玉案字書射字凡泛言射則去聲以射其物而言則入聲覆字覆蓋則去聲反覆則入聲故射覆二字竝應入聲今竝誤從去聲李義山詩隔座送鈎春酒暖分曹射覆蠟燈紅以射覆對送鈎音義曉然幅隕詩幅隕既長毛傳幅廣也隕均也朱傳幅猶言邊幅也隕讀作員謂周也俗因幅從巾隕亦誤從巾案字韻書無􅊷字惟近時古今韻略作幅􅊷引商頌證之非也跅弛漢武求茂材異等詔夫泛音捧駕之馬跅弛音始之士亦在御之而已師古曰跅者跅落無檢局也弛者放廢不遵禮度也俗因跅從足弛亦誤從足字書無􅕟字無盡藏無盡藏音臟與寶藏之藏同本佛家語赤壁賦用之又易慢藏誨盜慢藏對冶容是死字去聲無疑詩亶侯多藏記月令謹蓋藏之類竝音才浪反毛晃曰凡物自隱則平聲物不自隱而我隱之與府藏之藏則去聲玉謂平聲是活字藏之也去聲是死字目其所藏也故無盡藏等俱應仄用偶檢容齊隨筆中玉津園喜晴一律有無盡藏字録之以信古人用字之精不似今人鹵莽誤拈平仄也五更猶自雨如麻無限都人仰翠華翻手作雲方悵望舉頭見日共驚嗟天公的有施生妙帝力堪同造物誇上苑春光無盡藏可須羯鼓更催花薝蔔薝音膽薝蔔即梔子又名林蘭佛書如入薝蔔林中聞薝蔔花香不聞他香故曾端伯呼為禪友歷檢字韻書薝竝作上聲謂俗讀簷讀占為非然東坡贈詩僧道通詩香林乍喜聞薝蔔古井惟慚斷轆轤作平聲用不知又何據九亰記檀弓是全要領以從先大夫於九亰也陳氏集說音注云亰古原字鄭氏曰晉卿大夫之墓地在九原據此今人用作九京似誤前聞一宿儒曽言之然案方氏曰九京即九原指其冡之高曰京指其地之廣曰原則九京九原本通用故黃山谷詩百不一試埋九京元遺山詩仕才千石埋九京皆押入庚韻踉蹡昌黎贈張籍詩君來好呼出踉蹡越門限踉蹡行不正貌踉音亮蹡去聲二字與平聲義不同俗以亂走為踉蹌讀郎倉非蹌音鏘趨蹌行動貌詩濟濟蹌蹌威儀舒揚也書鳥獸蹌蹌舞貌豫謂行走急遽應曰狼竄野客叢書以物性喻人云言其亂走則曰狼竄是也後因聲訛呼為郎倉亦未可知古人字止一言容齊隨筆舉古人字止一言者如陳勝字涉項籍字羽彭越字仲張歐吳廣枚乘字叔朱雲字游爰即袁字盎字絲張釋之字季鄭當時字莊之類玉案古人字止一言者甚多即如四書中管仲曾晳類皆是今人相習不覺耳更有三言字晉時張天錫字公純嘏音假是也三言名亦往往有之楚令尹子文姓鬭名穀於菟訂僞雜録卷二
