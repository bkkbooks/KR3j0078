body:
  text: 訂譌雜錄卷四青浦胡鳴玉撰覽揆初度詞人以生辰為覽揆上聲為初度本之離騷曰皇覽揆於初度兮肈錫余以嘉名名余曰正則兮字余曰靈均皇即原父伯庸覽者視其狀貎揆者度其將來初度猶言初時日月星辰各以度成時也言皇考於已初生時覽其狀貎不凡揆其將來必異因賜以嘉名也流俗不明二字之義輒誤作攬揆曽見一舊詩以攬揆對懸弧不知其意以揆為何物揆本仄聲俗誤讀為葵説詳四書字音砭俗其揆一也句建瓴建瓴之建音謇覆音福也漢高紀譬猶居高屋之上建瓴水也如淳曰居高屋之上而幡瓴水言其向下之勢易也俗讀去聲非去聲樹也立也與幡倒意無涉剌謬乖剌剌音辢从束音肅非从朿音次僻也戾也太史公書私心剌謬栁子厚上大理崔大卿啓剌繆經旨不可以言乎學劉向𫝊謬戾乖剌東方朔曰吾强乖剌而無當杜欽曰陛下無乖剌之心俗讀為次謬乖次者不明剌與刺音次又音戚之别耳說字互誤左僖二十七年郤穀說禮樂而敦詩書說陸德明音悅林唐翁注言其所喜說者禮樂之事俗用敦詩説禮句誤為講說意學記及其久也相說以解說朱子謂應如字讀是相證而解也今作相悦以解檀弓天下其孰能説之俗或誤讀悦曲禮禮不妄説人俗或誤讀如字此字互音䕶相繆戾音利處甚多聊舉一二以例其餘扞格扞格牴牾不相入也格下革反音覈與格物音義不同學記發然後禁則扞格而不勝注扞拒扞也格讀如凍􅏖音涸之􅏖謂如地之凍堅强難入也案此俗用格格不相入句仍讀為隔非格又音各史平準書於是見知之法生而廢格詛誹窮治之獄用矣索音色隠曰格音閣梁世家竇太后義格服䖍曰格閣不行蘇林曰格音各又漢義縱傳廢格沮事淮南王傳雷被等格明詔師古竝音各止也沮隔也俗用格格不吐句仍讀為隔非大比大比音避總也周禮鄉大夫三年則大比攷其德行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賔之鄭司農云興賢者謂若今舉孝廉興能者謂若今舉茂才賔敬也敬所舉賢者能者𤣥謂變舉言興者謂合衆而尊寵之以鄉飲酒之禮禮而賔之玉案周禮言大比處甚多不顓指鄉舉州長三年大比則大攷州里以贊鄉大夫廢興縣師三年大比則以攷羣吏而以詔廢置均人三年大比則大均遂大夫三年大比則帥其吏而興甿小司冦及大比登民數自生以上登於天府司民及三年大比以萬民之數詔司㓂若此類竝音毗至反俗誤為比較之比假而假而二字今人習用不知其為假如也栁子厚荅韋中立書假而以僕年先我子聞道著書之日不後方崧卿謂而字應讀如見昌黎集注古而如字通用説詳四書字音砭俗望道而未之見句日知録云説文需从雨而聲葢即讀而為如也唐人詩多用而今亦作如今今江西人言如何亦曰而何輓近世史貨殖傳必用此為務輓近世塗民耳目則幾無行矣注謂用此以輓近世之俗也案此則輓與晚古字通用之説非是蓋輓止與挽通故輓歌亦作挽歌晚與輓義本各異安得相通也恣睢睢陽暴戾音利恣音志雎之雎音誨睢陽睢水之睢音雖又音揮仰目也莊子寓言篇而睢睢盱盱而誰與居三音為字則一竝從目從佳音皆與關雎之睢從且從隹音追不同今人不知分别恣睢睢陽等槩誤為疽音緣飾緣飾之緣音現與平聲不同史平津侯傳習文法吏事而又緣飾以儒術索隠曰謂以儒術飾文法如衣服之有領緣以為飾二字人所習用而不詳所出讀緣為平聲非也對越詒厥等語詩對越在天越於也是虛字今將對越二字截用於義不通此與居音基諸友于詒厥諸弊同雖在大家亦不免仍襲用之杜詩友于皆挺㧞交朋列友于山鳥山花各友于容齋隨筆作仙鳥仙花吾友于白詩三年隔友于杜詩童丱聨居諸韓詩誰謂詒厥無基阯皆屬歇後語友于詒厥作對黄徹䂬溪詩話云書言惟孝友于兄弟後漢史弼傳陛下隆於友于不忍遏絶而淵明詩遂云再喜見友于詩言詒厥孫謀南史到溉之孫藎從宋武帝登北固樓賦詩帝稱為才子後溉和上詩上輒手詔戲之曰得無詒厥之力乎而王儉碑文又云詒厥之寄允屬時望杜詩友于皆挺㧞昌黎詩誰謂詒厥無基址二事正可作對野客叢書曰洪駒父云世謂兄弟為㕛于謂子孫為詒厥歇後語也雖韓杜未能免俗吳曽漫錄乃引南史劉湛等㕛于之語以證子美所用為有自僕謂漫錄所引未也僕考諸史自東漢以來多有此語曰居詒厥之始曰㕛于之情愈西漢未之聞也可見後世文氣日不逮古近日四六多以爰音袁立對具瞻作宰相事用所謂爰立者訓於是乎立耳不知所立者何事而曰即膺爰立之除式副具瞻之望除即立瞻即望頭上安頭甚可笑也僕又考之曹氏命司馬氏文曰違兆庶具瞻之望桓豁疏曰願陛下追收謬眷則具瞻革望魏晉人已有此謬漕以水通輸曰漕去聲與漕邑之漕平聲不同漢書武帝紀春穿漕渠通渭如淳曰水轉運曰漕師古曰音才到反此字史漢甚多昌黎詩通波非難圖尺地易可漕善善不汲汲後時徒悔懊此讀去聲一證也俗於漕糧漕船類皆呼為曹非郅隆郅音質史封禪書爰音袁周郅隆注云郅至也登也謂登於隆盛之治也二字今人慣用而未明郅字之義故為疏其出處如此健羨漢司馬遷𫝊至於大道之要去健羡黜音出聰明注如淳曰知雄守雌是去健也不見可欲使心不亂是去羨也二字出處本非佳語今用作踴躍羨慕意非又拜今人書翰用又行二字不詳所出且不解所謂予偶檢一帖云十月十七日州民王操之頓首頓首舊京先墓毁動聞問傷惻痛不可言未得陳慰白牋不備操之再拜拜字草書與行字無異因悟又行之行乃是拜字又拜即再拜初非另作一行意世俗不知或眞書為又行字非也又拜字見處甚多儀禮士冠禮送母又拜士昏禮主婦又拜不宣野客叢書云漫錄謂文選楊修答臨淄侯牋末曰造次不能宣備書尾用不宣語起此僕觀漢高祖初定天下諸侯王上疏云云末云大王功德著於後世不宣昧死再拜此正不宣語之所從出也案此則東軒筆錄謂宋人書問自尊與卑曰不具以卑上尊曰不備朋友交馳曰不宣强為分别其説非是謹空黄魯直云大祝之秀反辨九即拜也三曰空首偶談元本誤梓作空手拜頭至手元本誤梓作拜頭至地所謂拜手唐人書末云謹空謂空首也池北偶談有此一則予攷顔魯公帖廿九日刑部尚書顔眞卿狀上李太保大夫公閤下下書謹空字以此為空首拜猶可又一帖眞卿頓首和南澄師大德侍者後另書一行云十日敬空既曰頓首又以敬空為空首於義不安後見夢溪筆談云前世風俗卑者致書於所尊尊者但批紙尾答之曰反故人謂之批反如官司批狀詔書批答之類故尾紙多作敬空字自謂不敢抗敵但空紙尾以待批反耳尊者亦自處不疑不務過敬也數見不鮮史陸賈𫝊數見不鮮無久慁公為也注索隠曰數見謂時時來見不鮮必令平聲鮮美作食莫令見不鮮之物也漢書作數擊鮮日知錄云數見不鮮意必秦時人語猶今人所謂常來之客不殺雞也賈乃引此以為父之於子亦不欲久慁當時之薄俗可知玉又案楊用修曰數見不鮮恐其久而厭也注非漢書作數擊鮮尤非此説與劉貢父合後世循之遂不復知有擊鮮之説矣蒲萄枇杷蒲萄之蒲枇杷之枇俗呼仄聲亦有所本白樂天房家夜宴喜雪詩酒鈎送盞推蓮子燭淚粘盤壘蒲萄又燕姬酌蒲萄山枇杷詩深山老去惜年華况對東溪野枇杷又張祜詩生摘枇杷酸皆仄用琵琶琵琶之琶古亦有作仄聲用者白樂天春聽琵琶詩四弦不似琵琶聲亂寫眞珠細撼鈴及琵琶行云忽聞水上琵琶聲洪文敏謂二琵字竝入聲讀又金屑琵琶槽又張祜詩宫樓一曲琵琶聲唐宣宗弔白樂天童子解吟長恨賦女兒能唱琵琶篇平一讀病平音病平其不平也如楊子一鬨音巷之市必立之平漢書廷平天下之平之類又周禮注平價曰平竝作仄聲説見四書字音砭俗離婁章注賈昌朝音辨蒲兵切均也蒲柄切品物定法也評論平聲之評亦可讀為病昌黎詩爾來曽幾時白髮忽滿鏡舊遊喜乖張新輩足嘲音遭評王元美曰廷評之評不知古何以作去聲寧一讀佞寧平聲安也音佞願也說本賈氏音辨韻書謂今俗言寧可為甯可玉案晉書寧馨字古多仄聲用張謂詩家無阿堵物門有寧馨兒東坡詩六朝人物餘丘隴空使姦雄笑寧馨作一讀做昌黎詩非閣復非船可居兼可過君若問方橋方橋如此作少陵詩主人送客何所作自注去聲岑參詩歸夢秋能作權德輿詩小婦無所作亦自音佐白樂天皮日休詩皆然韻書謂俗作做非做音直信反帆一作去聲劉熙釋名曰隨風張幔曰帆注去聲廣韻曰船使風音與梵同左傳杜注㧞斾投衡上差音蠆輕使不帆風陸氏音凡劍反杜詩浦帆晨初發郊扉冷未開朱子引以證韓詩不枉故人書無因帆江水謂帆字當去聲又張説之詩夏雲隨北㠶同日過江來張曲江詩征鞍税北渚歸帆指南陲劉刪詩囘艫乘派水舉帆逐分風包何詩錦帆乘風轉金裝照地新孟浩然詩嶺北囘征帆巴東問故人楊用修曰近蘇州刻孟詩改征帆為征棹何仲黙笑曰征帆改征棹錦帆亦改曰錦棹可乎並一讀傍並一音蚌與傍同如史秦紀並河以東匈奴傳並陰山下漢書北至琅邪並海上説苑並崖止之見處甚多不暇縷舉也又杜詩玉山高並兩峰寒蘇詩今年並海棗如瓜今人不知作如字讀氷一讀柄氷賈昌朝字音清濁辨云筆凌切水凝彼病切所以寒物包佶詩春飛雪粉加毫潤曉潄瓊漿氷齒寒義山詩嘉瓜引蔓長碧玉氷寒漿簟氷將飄枕簾烘不隠鉤瑇瑁明書閣琉璃氷酒缸皆仄用膏一讀告膏音告謂以脂膏潤物也是活字如詩羔裘如膏日出有曜芃芃黍苖陰雨膏之悠悠南行郇伯勞之之類又白樂天和令平聲狐令公詩仁風扇自注平聲道路陰雨膏自注去聲閭閻賈氏字音清濁辨古刀切脂凝古到切所以潤物收一讀狩收有去聲易井收勿幕韻書隸宥韻内昌黎南山詩或行而不輟或遺而不收或斜而不倚或弛上聲而不彀本此賈氏音辨式周切斂也式救切斂之膠一讀絞膠上聲是活字與平聲不同白樂天詩三杯藍尾酒一楪膠牙餳又歲琖後推藍尾酒春盤先勸膠牙餳蘇詩童子愁氷硯佳人苦膠杯皆仄用張一讀漲張音漲自侈音恥大也左宣六年我張吾三軍又隨張必棄小國請羸師以張之昌黎詩云詩成使之寫亦足張我軍注音豬亮切本之左傳又主張之張古亦有作仄聲用者晏小山詩春風自是人間客主張繁華得幾時遲一讀穉遲音穉待也易歸妹遲歸有時史漢讀去聲處甚多如遲明圍宛音苑臣老遲還恐不相見側席遲士營中遲旦之類又韓詩遲爾一來翔國家遲子榮貎一讀莫貎音漠描畫人物類其狀也與形貎音義不同如杜詩畫工如山貎不同曽貎先帝照夜白屢貎尋常行路人貎得山僧及童子之類裁一讀在後漢李膺𫝊獨持風裁注音才代反又范滂清裁注音才載反賈氏音辨平聲制也去聲體制合宜故風裁體裁品裁竝音在韻書𨽻仄聲又公羊傳辯而裁史記張儀傳裁如嬰兒文選豐約之裁綜覈精裁凡此類皆與裁度裁成平聲不同以上數字音義俗不盡知也元今人詩題誤寫元韻作原韻雖號作家往往不免日知録云元者本也本官曰元官本籍曰元籍本來曰元來唐宋人多此語後人以原字代之不知何解原者再也易原筮周禮馬質禮記月令原蠶文王世子未有原漢原廟之原皆作再字解漢書注師古曰原重也言巳有正廟更重立也與本來之義全不相同或以為洪武中臣下有稱元任官者嫌於元朝之官故改此字又云古人亦有稱原官者後漢張衡應間曩滯日官今又原之注爾雅曰原再也衡為太史令去官五載復為太史令故曰原之然則原官乃再官之義也玉案古人詩文中本來義無一作原者偶閲杜詩拈出一二處為證鬢毛元自白淚㸃向來垂渚栁元幽僻邨花不埽除錦江元過楚劍閣復通秦其餘不可殫述也刺刺昌黎送殷員外序丁寧顧婢子語刺刺不能休刺音戚字从朿音次非从束方崧卿注曰洪慶善云剌音慮達反樊澤之曰刺七迹反若如洪讀則以戾音利為義顧婢子語何戾耶潘岳閣道謠和嶠刺促不得休語意皆同此當以七迹反為正予見今之習韓文者多讀為辢辢不能休故録方注如此龍鍾龍鍾一説竹名謂年老之人如竹枝揺曵不自矜持一説石名謂老人身重如石難移動也此皆杜撰不經之語杜詩何太龍鍾極於今出處妨龍鍾若作竹石名是死字如何對得出處二字來且其為義亦不一有作下淚解者有作蹭蹬解者今人但知為老憊用耳王褒音包書云授筆攬紙龍鍾横集常建詩雙袖龍鍾淚不亁李端詩龍鍾相見誰能免此下淚之狀也蘇頲詩龍鍾踏澗泥香山詩瀟灑登山去龍鍾遇雨囘莫問龍鍾惡官職且聽清脆好詩篇此蹭蹬之意也此詩何太龍鍾極高適詩龍鍾還忝二千石元載别妻詩誰不厭龍鍾昌黎詩白首誇龍鍾元遺山詩奮迅舊嫌扶老杖龍鍾今屬負暄牆此老憊意也又荀子隴種東籠而退注遺失貎埤蒼作躘踵或作㣫杜弼為侯景檄梁曰龍鍾稚子裴度曰見我龍鍾故相戲爾總為潦倒笨累之狀乃知二字之解甚多隨所用而各異不得拘泥於老憊一意而竹與石之俗説紛紛也訂譌雜録卷四
