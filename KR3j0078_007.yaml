body:
  text: 訂訛雜録卷七青浦胡鳴玉撰逃禪少陵飲中八仙歌蘇晉長齋繡佛前醉中往往愛逃禪逃禪猶云逃墨逃楊是逃而出非逃而入王嗣奭云醉酒而悖其教故曰逃禪後人以學佛者為逃禪誤矣玉案東坡老叨賦美人告去已而雲散先生方兀溫入聲然而禪逃逃禪作禪逃益信王説為不誣若為學佛解應曰安禪杜詩亦有之登惠義寺云誰能解金印瀟灑共安禪齊魯論之名始於漢漢藝文志論平聲語者孔子應答弟子時人及弟子相與言而接聞於夫子之語也當時弟子各有所記夫子既卒門人相與輯而論纂師古曰與撰同故謂之論語漢興有齊魯之説傳齊論者昌邑中尉王吉諸人傳魯論者常山都尉龔奮諸人洪文敏謂魯論語魯人所傳齊論語者齊人所傳是也止此一論語特所傳不同耳此猶齊詩韓詩毛詩戴禮之類各以顓門之學名其書也舊聞一老宿云夫子魯人故號魯論果如其説將何以處齊論乎八股文緣起今之八股文或謂始於王荆公或謂始於明太祖皆非也案宋史寧熙四年罷詩賦及明經諸科以經義論策試進士命中書撰大義式頒行所謂經大義即今時文之祖然初未定八股格即明初百餘年亦未有八股之名故今日所見先輩八股文成化以前若天順景泰正統宣德洪熙永樂建文洪武百年中無一篇傳也日知録云經義之文流俗謂之八股蓋始於成化以後股者對偶之名也天順以前經義之文不過敷演傳注或對或散初無定式其單句題亦甚少成化二十三年會試樂天者保天下文起講先提三句即講樂天四股中間過接四句復講保天下四股復收四句再作大結𢎞治九年會試責難於君謂之恭文起講先提三句即講責難於君四股中間過接二句復講謂之恭四股復收二句再作大結每四股之中一反一正一虛一實一淺一深其兩扇立格則每扇之中各有四股其次第之法亦復如之故今人相傳謂之八股若長題則不拘此嘉靖以後文體日變而問之儒生皆不知八股之何謂矣戊音茂戊已之戊音茂俗誤讀務昌黎南山詩藩都配德運分宅占丁戊逍遙越坤位詆許陷乾竇書洛誥戊辰王在新邑召誥越三日戊申泰誓惟戊午王次于河朔傳並音茂展卷即見今之習尚書者其誰遵之容齋隨筆云戊字與茂同音俗呼為務非也吳中術者又呼為武偶閲舊五代史梁開平元年司天監上言日辰內戊字請改為武乃知有所自也朱溫父名誠以戊類成字故司天諂之耳洗馬洗馬秦官漢亦曰洗馬太子出則當直者前驅導威儀也流俗誤意為洗濯之義如杜詩所云晚涼看洗馬者非也日知録有此一條援音袁引甚博詳録於此云越語句踐身親夫差前馬韓非子云為吳王洗馬洗音銑淮南子云為吳兵先馬走當作吳王荀子天子出門諸侯持輪挾輿先馬賈誼新書楚懷王無道而欲有霸王之號鑄金人以象諸侯人君令大國之君編而洗馬梁王御宋王驂乘滕薛衛中山之君隨而趨然則洗馬者馬前引導之人也亦有稱馬洗者六韜賞及牛豎馬洗廄養之徒漢書百官表太子太傅少傅屬官有先馬張晏曰先馬員十六人秩比謁者先或作洗又考周禮齊右職云凡有牲事則前馬注王見牲則拱而式居馬前郤行備驚奔也又道右職云王式則下前馬是此官古有之矣莊子黃帝將見大隗乎具茨之山張若謵朋前馬健訟之誤容齋隨筆云破句讀書之誤根著於人殆不可復正在易訟卦曰訟上剛下險險而健訟以健字為絶句乃及於訟始係以訟童蒙入學之初其師點句輒混於上遂以健訟相連凡謂頑民好訟者曰嚚訟曰終訟可也黃魯直江西道院賦云細民險而健以終訟為能筠獨不嚚於訟是已玉案險而健訟與蒙卦之險而止蒙隨卦之動而説隨蠱卦之巽而止蠱一例諸卦未嘗誤讀豈獨誤於訟也此非讀書破句之過乃流俗割裂截取之弊如韻府於送韻中收健訟二字謂本於周易是也至以好訟為嚚於訟亦未安口不道忠信之言曰嚚訟爭辨也自是二項尚書傅可證也築長城非始于秦皇後人謂長城之築始於秦皇豫考史漢胸奴傳隴西北地上郡長城秦築之昭王陰山髙闕長城趙築之造陽襄平長城燕築之後秦滅六國而始皇使蒙恬將十萬之衆北擊悉收河南地因河為塞築四十四縣城臨河徙適戌以充之而通直道自九原至雲陽因邊山險塹溪谷可繕者治之起臨洮至遼東萬餘里然則長城之築在始皇前已非一日萬里之名特起於始皇耳日知録謂古時中國多有長城不但北邊博引羣書若齊若魏若韓若楚若趙與中山皆鑿然可據今韻非沈約本誤以今世所傳詩韻為沈約所撰其來已久如元黃公紹七音考周德清中原音韻宋濂洪武正韻之類無不極詆約韻為江左偏音不足為據不知約所撰四聲一卷久矣無存近毛大可氏謂今世所用乃宋淳祐間江北平水劉淵所撰為平水韻非沈韻也而邵子湘氏謂並非劉氏之舊乃元時陰氏兄弟所著其言較毛氏尤為詳晰備録於此以資博雅之覽曰今韻宗梁沈約氏夫人而言之而約所撰四聲一卷久已亡繼之者隋陸法言氏而法言所撰四聲切韻亦亡嗣是有唐孫愐氏而愐所撰唐韻五卷今亦亡今宋元韻之存者略可指數廣韻宋祥符間所修也集韻宋景祐間奉敕修也禮部韻略宋時列之學官不作宫者也毛晃氏仍禮韻而增益之者也平水劉淵氏仍禮韻而通併其部分者也元黃公紹氏作韻會仍劉韻而廣其箋注者也三家者遞有增字字寖以多禮部韻初裁九千五百九十字至韻會乃有一萬二千六百字矣然尚不足當集韻四之一最後有陰氏兄弟著韻府乃大加刋看平聲削僅存八千八百草字又不専主劉韻頗多遺漏顧明初至今用之學者或尊之為沈韻或指之為平水韻皆是書也今韻非沈韻不待言校劉韻少三千字則今韻之非劉韻較音角然易辨而世儒罕見劉氏元本乃承訛襲舛三百餘年相習而不察可怪也裝潢西溪藂語云唐祕書省有裝潢匠六人潢集韻音胡曂切光上聲釋名染紙也齊民要術有裝潢紙法又漫汁入潢凡潢紙減白便是染則年久易暗蓋染潢也後有雌黃治書法云潢訖治者佳先治入潢則軟要術後魏賈思協撰則古用黃紙寫書久也寫訖入潢辟蠧也今惟釋藏經如此先寫後潢又歐陽公言祕閣初為太宗藏書之府並以黃綾裝潢謂之太清本潢猶池也外加緣去聲則內為池裝成卷册謂之裝潢二説不同懶真子録云裝潢恐是表背匠然謂之潢其義未詳馬氏蓋未之深考耳大采朝日大采朝音潮日少采夕月語出魯國語古者旦見曰朝暮見曰夕記玉藻天子黑冕元端而朝日於東門之外漢賈誼傳春朝朝日秋夕夕月朝日夕月本皆活字流俗不明夕是朝見之名因誤讀朝日為昭唐時有祀朝日之制栁子厚作朝日説深辨讀昭音且加祀字之謬長年杜工部撥悶詩云長上聲年三老遙憐汝捩柂開頭捷有神蔡注云峽中以篙師為長年柂工為三老邵注云三老捩柂者長年開頭者又夔州歌絶句云長年三老長歌裏白晝攤錢高浪中又最能行云歸州長年行最能陶南村輟耕録有此一條但止引長年三老長歌裏為證而訛長歌為歌聲且引古今詩話謂川峽以篙手為三老與蔡邵二説不同渭陽詩我送舅氏曰至渭陽我送舅氏悠悠我思序以為時康公之母穆姬已卒故穆公送其舅而念母之不見也今人言生與甥同舅事輒曰渭陽母亡則可若母在而稱之是死其母也不祥孰甚焉資暇録云徴舅氏事必用渭陽前輩名公往往亦然兹失於識豈可輕相承耶審詩序當悟不可徴用矣是以齊楊愔幼時其舅源子恭問讀詩至渭陽未愔便號泣子恭亦對之欷歔容易否則世俗語言有割裂成文沿用既久不覺其非者如漢東方朔傳吳王曰先生可以談矣先生曰談何容易何容猶言豈可也容字不連易字讀後漢何進傳國家之事亦何容易覆音福水不收宜深思之觀此益信後人輒曰容易非也尚書無逸相小人厥父母勤勞稼穡厥子乃不知稼穡之艱難乃逸乃諺既誕否則侮厥父母曰昔之人無聞知否字斷句則侮厥父母曰六字自為一句故蔡傳云不然則又訕侮其父母云云也下文否則厥心違怨否則厥口詛祝音咒皆然今以否則二字為句亦非也乘查乘槎應作查至天河得織女支機石歸問成都嚴君平曰某時客星犯斗牛即此人也此係海客事見博物志案漢張騫傳及西域傳並不言博望乘槎自宗懍荆楚嵗時記訛為張騫張嚴不同時安得相見可笑其妄雖少陵大家亦承襲用之如乘槎有漢臣槎上似張騫奉使虛乘八月槎乘槎斷消息無處覔張騫之類東坡有次韻陳海州乘槎亭詩無一字謬涉張騫真卓識也白首為郎非馮唐事白首為郎是顔駟事古今詞人屬之馮唐少陵詩亦踵此弊如馮唐毛髮白歸興日蕭蕭乘白馮唐老清秋宋玉悲之類此與以乘查為張騫事同一誤也案史馮唐傳唐以孝著為中郎署長事文帝文帝輦連上聲過問唐曰父老何自為郎云云並無白首字野客叢書云漢武故事載顔駟一事甚與馮唐同曰上至郎署見一老郎鬢眉皓白問何其老也對曰臣姓顔名駟以文帝時為郎文帝好文而臣好武景帝好老而臣尚少陛下好少而臣已老是以三葉不遇上感其言擢為會稽都尉然人往往以此事為馮唐事用如白氏六帖曰漢文帝時馮唐白首為郎帝問之對曰臣三朝不遇樂天詩亦曰重文疏卜式尚少棄馮唐楊巨源詩曰此地含香從白首馮唐何事怨明時劉孝標辨命論曰賈大夫沮志於長沙馮都尉皓髮於郎署左太沖咏史詩曰馮唐豈不偉白首不見招皆有白首不遇之説是以顔駟事為馮唐用也東坡詩曰是為先帝白首郎李注亦引馮唐之事如此甚多諸詩誤引承襲而然白帖云云尤為可笑葷腥之辨流俗不明葷音熏腥之辨每逢祭祀輒斷腥羶謂之食素至於酒醴之設在所不禁大非也魚肉謂腥臭菜謂葷蔥酒蒜薤之屬皆是祭祀之齋與酒同禁之者恐以昏濁之物亂其専一之誠耳偶閲鼠璞一書已曾言之云宋戴埴著東坡年譜載程蘇當致齋厨稟造食葷素蘇令平聲辨葷程令辨素蘇謂致齋在心豈拘葷素為劉者左袒時館中附蘇者令辦葷附程者令辦素豫謂不然齊之禁葷見於法令乃禁五辛慮耗散人之氣間其精誠與禁飲酒聽樂嗜欲悲哀同欲其致一之妙通於神明耳二公未免以葷為魚肉徒有是非之辨莊子載顔回不飲酒不茹葷謂祭祀之齋是也不諱字古人諱名不諱字故於祖父師長之字直指而不以為斥中庸仲尼曰仲尼祖述堯舜孫稱祖字也離騷朕皇考曰伯庸子稱父字也論語仲尼日月也對曰子夏曰之類弟稱師字也朱子曰古人未嘗諱字程先生云豫十四五從周茂叔本朝先輩尚如此伊川亦嘗呼明道字日知録云字為臣子所得而稱故周公追王其祖曰王季王而兼字湯餅生兒三日會客名曰湯餅東坡賀陳述古弟章生子詩甚欲去為湯餅客却愁錯寫弄麞書向疑湯餅是二物如何對得弄璋近閲倦遊録宋張師正著云今人呼煮麵為湯餅唐人呼饅頭為籠餅因知湯餅者乃湯之餅是一物非二物也益信古人對偶之精此與第二卷所言義山詩以射覆對送鉤同同姓為昏禮娶妻不娶同姓然余觀古人氏族之辨溯流尋源或同姓而非一族或異姓而實為同族即以王氏論一曰琅邪二曰太原三曰京兆所出不同野客叢書云曹子建作王仲宣誄曰流裔畢萬末胄稱王厥姓斯氏條分葉散世滋芳烈揚聲秦漢吕向注秦有王翦王離漢有五侯按王粲系畢萬高之後畢萬封於魏後十代文侯始列為侯至孫稱惠王因之王為氏而秦之翦離自周太子晉之後漢之五侯自齊田和之後此三派元不相干注引為一誤矣故新莽以姚媯陳王田五姓為宗室玉案莽自謂虞舜後以五姓皆舜裔耳且禁元城王氏勿與四姓為婚而已自取王欣之女魏東萊王基為子納太原王沈女皆不以為嫌蓋知此也玉又案少陵寄族弟唐十八使君詩與君陶唐後盛族多其人聖賢冠史籍枝派羅源津是杜與唐為兄弟也重送劉十弟判官詩分源豕韋派别浦鴈賓秋年事推兄忝人才覺弟優是杜與劉又兄弟也昌黎送何堅序何與韓同姓為近容齋三筆引孫愐唐韻韓滅子孫分散江淮間因以韓為何字隨音變遂為何氏異姓稱族今人豈能辨此締姻但避同姓而不知或蹈瀆倫之愆矣報聞罷今人以落第為報罷不詳所出漢東方朔傳其不足采者輒報聞罷師古曰報云天子已聞其所上上聲之書而罷之令平聲歸又梅福傳詣行所在條對急政輒報罷半菽漢項羽傳今嵗飢民貧卒食半菽軍無見糧注臣瓚曰士卒食蔬菜以菽雜半之漫與杜少陵水檻遣心詩云老去詩篇渾漫與今本梓作漫興考舊刻劉會孟本千家注本皆作漫與趙次公云耽佳句而語驚人言其平昔如此今老矣所為詩則漫與而已無復著意於驚人也劉後村集跋陳教授杜詩補注亦云或信漫與云云王介甫詩粉墨空多直漫與東坡詩袖手焚筆硯清篇真漫與皆可相證又杜集有絶句漫興九首韻府亦引作漫與宣室宣室有二殷宣室在朝歌史龜策傳武王圍紂象郎自殺宣室徐廣曰天子之居名曰宣室淮南子云武王甲卒三千破紂牧野殺之宣室注曰殷宫名一曰獄也音如宣帝宣王之宣漢未央殿前有溫室宣室音如負暄之暄見集韻名同而音異三輔黃圖謂漢之宣室取殷舊名非也裋褐揚雄方言自關而西以襜褕短者謂之裋漢貢禹傳粳豆不贍裋褐不完敘傳思有裋褐之褻儋石之畜師古並音豎謂僮豎所著布長襦也又史秦紀寒者利短褐索隱曰褐布豎裁為勞役之衣短而且狹故謂之短褐亦曰豎褐孟嘗君傳士不得短褐索隱音竪案此二則正文並作短注或作竪音竪故杜詩直用作長短之短如賜浴皆長纓與宴非短褐短褐風霜入還丹日月遲江湖漂短褐霜雪滿飛蓬諸生舊短褐旅泛一浮萍之類董彥逺洪慶善皆辨古無短褐字史孟嘗君傳諸處係後世傳寫之訛至唐儒方兩用之未知然否曽見一辨證書云近得古本杜詩短褐風霜入諸處短皆作䄈乃知今本之訛豫謂裋褐短褐雖皆本之史漢不妨通用然如杜詩所云斷冝作短非裋也觀其屬對應自知之訂訛雜録卷七
