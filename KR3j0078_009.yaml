body:
  text: 訂譌雜録卷九青浦胡鳴玉撰濫觴家語三恕篇孔子謂子路曰夫江始出於岷音民山其源可以濫觴及其至於江津不舫平聲舟不避風則不可以渉非惟下流水多耶濫觴是言其始出之微故韓詩外傳作不足濫觴後人指為末流之弊如曰至今日而濫觴極矣之類謬也黄山谷詩岷江初濫觴入楚乃無底又濫觴雖有罪末派瀰九縣古人元不誤用史孟茍傳始也濫耳注引濫觴為始之義釋之魁日知録云今人所奉魁星不知始自何年以奎為文章之府故立廟祀之乃不能像奎而改奎為魁又不能像魁而取之字形為鬼舉足而起其斗不知奎為北方元武七宿音肅之一魁為北斗之第一星所主不同而二字之音亦異今以文而祀乃不於奎而於魁失之逺矣橋梓劉向説苑伯禽與康叔封朝於成王見周公三見而三笞乃相與見商子曰二子盍相與觀乎南山之陽有木焉名曰橋二子者往觀乎南山之陽見橋竦焉實而仰商子曰橋者父道也二子盍相與觀乎南山之隂有木焉名曰梓二子者往觀乎南山之隂見梓勃焉實而俯商子曰梓者子道也二子見乎周公入門而趨登堂而跪周公拂其首勞而食之曰安見君子二子對曰見商君周公曰君子哉商子也後世稱父子曰橋梓本此俗作喬梓非疆埸埸音亦从易説文注疆也場音長从昜即陽字説文注祭神道田不耕治榖田也經傳中疆埸字甚多絶無疆場字詩疆埸翼翼廼埸廼疆疆是大界埸是小界今小田塍音仍也又邊境也左桓十七年疆埸之事愼守其一而備其不虞莊二十八年疆埸無主則啓戎心襄十一年使疆埸之司惡於宋昭元年疆埸之邑一彼一此何常之有二十七年吳新有君疆埸日駭定四年彝德無厭若隣於君疆埸之患也埸陸德眀竝音亦後世用作疆場意為封疆戰場非也駱賓王詩膂力風塵倦疆場嵗月窮乃知此誤已久客作野客叢書引吳曾漫録云江西俚俗罵人曰客作兒案陳從易寄荔枝與盛參政詩橄㰖為下輩批杷客作兒僕謂受雇者為客作已見於南北朝觀袁翻謂人曰郉家小兒為人客作表章此語自古而然勉夫之言如此予又案西京雜記康衢家貧勤學邑有大姓多書乃與客作得徧讀王人書又輟畊録云今人之指傭工者曰客作三國時已有此語焦光飢則出為人客作飽食而已觀此則又不始於南北朝矣委靡委靡披靡波靡等竝讀上聲借音米説見四書字音砭俗雖華不為靡句偶檢放翁詩已分文章歸委靡可憐意氣尚憑陵一友疑其失嚴與失粘同用朱筆標志不知出自誰手不眀字音反欲致疑古人可笑其妄眀經今世科名稱謂有與古悖戾者相承不覺日知錄言之甚詳摘録五條於此曰今人但以貢生為眀經非也唐制有六科一曰秀才二曰眀經三曰進士四曰眀法五曰書六曰算大唐新語隋煬帝置眀經進士二科國家用隋制增置秀才眀法眀字眀算并前為六科當時以詩賦取者謂之進士金史移刺履𫝊進士之科隋大業中始試以策唐初因之高宗時雜以箴銘詩賦至文宗始專用賦以經義取者謂之眀經葉石林避暑錄話唐制取士用進士眀經二科本朝初唯用進士其罷眀經不知始自何時仁宗患進士浮淺不本經術嘉祐三年始復眀經科今罷詩賦而用經義則今之進士乃唐之眀經也秀才舊唐書杜正倫𫝊正倫隋仁壽中與兄正𤣥正藏俱以秀才擢第唐代舉秀才止十餘人正倫一家有三秀才甚為當時稱羙唐登科記武德至永徽每年進士或至二十餘人而秀才止一人二人舊唐書職官志則云秀才有唐已来無其人杜氏通典云初秀才科第最髙試方略策五條有上上上中上下中上凢四等貞觀去聲中有舉而不第者坐其州長由是廢絶新唐書永徽二年始停秀才科士人所趨嚮惟眀經進士二科而已顯慶初黄門侍郎劉祥道奏言國家富有四海于今已四十年百姓官寮未有秀才之舉未必今人之不如昔將薦賢之道未至豈方稱多士遂缺斯人請六品以下爰音袁及山谷特䧏綸言更審捜訪唐人之於秀才其重如此秀才字出史記賈生𫝊年十八以能誦詩屬書聞於郡中吳廷尉為河南守聞其秀才而儒林傳公孫𢎞之議則曰有秀才異等輒以名聞此秀才之名所起元宗御撰六典言凡貢舉人有博識髙才強學待問無失俊選者為秀才通二經已上者為眀經眀閑時務精熟一經者為進士張昌齡傳夲州欲以秀才舉之昌齡以時廢此科已久固辭乃充進士舉及第是則秀才之名乃舉進士者所不敢當也又文苑英華判目有云郷進士至省求試秀才考功不聽求訴不已趙岊判曰文藝小善進士之能訪問不休秀才之目是又進士求試秀才而不可得也今以生員而冐呼此名何也容齋三筆謂秀才之召自宋魏以後實為貢舉科目之最而今世俗以為相輕之稱眀初嘗舉秀才洪武十五年徵至秀才數千人如太祖實錄洪武四年四月辛丑以秀才丁士梅為蘇州府知府童權為揚州府知府俱賜冠帶十年二月丙辰以秀才徐尊生為翰林應奉十五年八月丁酉以秀才曾泰為户部尚書是也亦嘗舉孝亷洪武二十年二月己丑以孝亷李德為應天府尹是也此辟舉之名非所施於科目之士今俗謂生員為秀才舉人為孝亷非也舉人舉人者舉到之人北齊書鮮于世榮傳以夲官判尚書省右僕射音夜事與吏部尚書袁聿修在尚書省簡試舉人舊唐書髙宗紀顯慶四年二月乙亥上親策試舉人凡九百人調露元年十二月甲寅臨軒試應岳牧舉人是也登科則除官不復謂之舉人而不第則須再舉不若今人以舉人為一定之名也進士乃諸科目中之一科而傳中有言舉進士者有言舉進士不第者但云舉進士則第不第未可知之辭不若今人以登科而後謂之進士也自夲人言之謂之舉進士自朝廷言之謂之舉人進士即是舉人不若今人以郷試榜謂之舉人㑹試榜謂之進士也進士進士即舉人中之一科其試於禮部者人人皆可謂之進士唐人未第稱進士已及第則稱前進士雍録引唐人詩云㑹題名處添前字通鑑建州進士葉京嘗預宣武軍宴識監軍之靣旣而及第在長安與同年出游遇之於塗馬上相揖因之謗議諠然遂沈廢終身是未及第而稱進士也試畢放榜其合格者曰賜進士及第後又廣之曰賜進士出身然後謂之登科所以異於同試之人者在乎賜及第出身而不在乎進士也宋政和三年五月乙丑臣僚言陛下罷進士立三舍之法今賜承議郎徐禋進士出身於名實未正乞改賜同上舍出身從之科目唐制取士之科有秀才有眀經有進士有俊士有眀法有眀字有眀算有一史有三史有開元禮有道舉有童子而眀經之别有五經有三經有二經有學究一經有三禮有三𫝊有史科此嵗舉之常選也其天子自詔曰制舉如姚崇下筆成章張九齡道侔伊呂之類見於史者凡五十餘科困學紀聞唐制舉之名多至八十有六故謂之科目宋王安石始罷諸科今代止進士一科則有科而無目矣猶沿其名謂之科目非也殺俗讀去聲白樂天翫半開花贈皇甫郎中詩西日憑輕照東風莫殺吹自注殺去聲玉案俗語太甚曰殺所嫁反沙去聲音厦與从广者不同廈遐上聲大屋亦作㬠容齋隨筆序㬠有好議論升菴字説引作殺有好處誤元人𫝊竒忒殺思量忒殺風流類皆太甚意若如字讀便非令甲今人以令甲為法律是未眀甲字義耳漢書宣帝紀令甲死者不可生注如淳曰令有先後故有令甲令乙令丙師古曰甲乙者若今之第一第二篇耳案此則令甲為最先之令江充𫝊如淳注令乙騎乘車馬行馳道中帝詔曰令丙箠長有數皆可證也説見宋戴埴䑕璞據國策當作鼠朴今曰璞誤也小學不講流俗作字輒多謬譌予於四書字音砭俗詳言之繼覧容齋隨筆一則實獲我心附錄於此以見予之訂正初非好為拘泥去聲吹毛索音色瘢也其言曰古人八嵗入小學敎之六書周官保氏之職實掌斯事厥後浸廢蕭何著法太史試學童諷書九千字乃得為吏以六體試之吏人上書字或不正輒有舉劾劉子正父子校中秘書自史籀以下凡十家序為小學次於六藝之末許叔重收集篆籀諸家之學就𨽻為訓注謂之説文蔡伯喈以經義分㪚𫝊記交亂訛謬相蒙乃請刋看平聲定五經備體刻石立於太學門外謂之石經後有呂忱又集説文之所漏略著字林五篇以補之唐制國子監置書學博士立説文石經字林之學舉其文義嵗登下之而考功禮部課試貢舉許以所習為通人茍趨便不求當否大厯十年司業張參纂成五經文字以類相從至開成中翰林待詔唐元度又加九經字様補參之所不載晉開運末祭酒田敏合二者為一編並以考正俗體訛謬今世不復詳考雖士大夫作字不能悉如古法矣韓子云凡為文辭宜略識字又云阿買不識字頗知書八分安有不識字而能書蓋所謂識字者如上所云也予采張氏田氏之書擇今人所共昧者漫載于此以訓子孫本字从木一在其下今為大十者非美从羊从大今从犬从火者非看字从手凢視物不審則以手遮目看之作㸔者非乾有干䖍二音為字一體今俗分别作乹字音䖍而乾音干者非夷从弓从大作夷者訛耆从旨作老下目者訛決沖況涼盜並从水作冫者訛饑飢二字上穀不熟下餓也今多誤用至於果芻韭之加草岡加山筍作笋頿作頾須加髟或从水寶从尔趨从多衡合从角从大而从魚肈从文蟲作虫墮許規反俗作隳炙从夕閒从日㓛从力玆合从二元而作兹姦為姧纛从毒舌从千京作亰次从冫濳僭譖从替出作二山皁為皂匹為疋敘作叙曷為曷怪為恠凢作凡允作允館作舘覽作覧祭合从月从又而作祭瞻作瞻淫从缶徧作遍徼作僥漾作漾琴瑟之弦从糸如是者皆非也土著史記其俗土著直略反長入聲又漢食貨志理民之道地著為本貴粟論不農則不地著地著與土著同謂民之久居其所如物之黏著而不他徙也俗或誤讀土注法三章耳史漢髙紀與父老約法三章耳殺人者死傷人及盜抵罪餘悉除去秦法諸吏人皆案堵如故王厚齋陸農師皆以與父老約為句絶法三章耳另為一句朱子亦以為然案堵漢書作按堵同應劭曰按按次第也後人用作安堵非西崑體古今詩話云宋初楊大年億錢文僖惟演晏元獻殊劉子儀筠為詩皆宗義山號西崑體後進效之多竊取義山詩句嘗内宴優人有為義山者衣服敗裂告人曰我為諸館職撏撦至此聞者大噱案此則楊劉輩效義山詩其所作號西崑體葉石林謂歐陽公詩始矯崑體専以氣格為主亦指楊劉輩言今直以義山集為西崑詩非是前人嘗有言之者元遺山論詩絶句云望帝春心託杜鵑佳人錦瑟怨芳年詩家總愛西崑好獨恨無人作鄭箋亦踵此弊先容今人習用先容字不知其出且昧其義漢鄒陽𫝊蟠木根柢輪囷離竒而為萬乘器者以左右先為之容也師古曰萬乘器天子車輿之屬容謂彫刻加飾史記注索音色隱曰左右先加彫刻為之容飾醖藉漢薛廣德𫝊廣徳為人温雅有醖藉師古曰醖言如醖釀仰去聲也藉有所薦藉也亦作温籍義縱𫝊治敢往少温籍師古曰少温籍言無所含容也温音於問反籍音才夜反案此二則先容是取義於木醖藉是取義於酒芧栗夢溪筆談云江南有小栗謂之茅栗茅音草茅之茅以予觀之此正所謂芧也則莊子所謂狙音朱公賦芧音序此文相近之誤也存中之説如此因思少陵南隣詩錦里先生烏角巾園收芧栗未全貧夲於莊子徐無鬼篇先生居山林食芧栗也今注家必欲改作芋栗謂蜀有蹲䲭且芋栗二物可該園中所産而芧栗野生不待園中收種若但芧栗充飢安得謂未全貧此種議論雖似近理終覺牽合支離未必當時杜公意也昔人謂杜詩韓文無一字無来厯以芧栗屬先生説此正從莊子来也紛紛聚訟不當息乎天夭是㭬筆談云書之闕誤有可見於他書者如詩天夭是㭬後漢蔡邕𫝊作夭夭是加與速速方榖為對沈説如此然朱子訓天禍㭬喪自應作天夭况劉貢父在存中前已謂蔡邕𫝊夭夭當作天夭存中乃欲援音袁史證經非也白樂天詠懐詩冉牛與顔淵卞和與馬遷或罹天夭極或被人刑殘以人對天尤可相證邕𫝊作速速方轂注謂小人乘寵方轂而行方猶並也筆談引作榖亦非臯比臯比音皮流俗往往作上聲用非是朱子張横渠贊勇撤臯比蓋以虎皮為講席也唐戴叔倫禪寺讀書詩猊座翻蕭索臯比喜接連則以臯比為講席唐世已然臯比字出左傳莊公十年蒙臯比而先犯之杜元凱注云虎皮也陸徳眀釋文比音毗煬竈昔一友問予煬竈二字所出予以莊子煬者避竈答之然與嬖侫弄權意無涉也近閱戰國策衛靈公近癰疽彌子瑕二人者專君之勢以蔽左右復塗偵謂君曰昔日臣夢見君君曰子何夢曰夢見竈君君忿然作色曰吾聞夢見人君者夢見日今子曰夢見竈君而言君何也有説則可無説則死對曰日并燭天下者也一物不能蔽也若竈則不然前之人煬則後之人無從見也今臣疑人之有煬於君者也是以夢見竈君煬音樣吳音誤讀為陽冬至書雲之誤容齋隨筆云今人以冬至日為書雲至用之於表啓中雖前輩或不細考然皆非也左傳僖五年正月辛亥朔日南至公既視朔遂登臺以望而書禮也凡分至啓閉必書雲物為備故也杜注周正月今十一月分春秋分也至冬夏至也啓者立春立夏閉者立秋立冬雲物者氣色災變也蓋四時凢八節其禮並同漢明帝永平二年春正月辛未宗祀光武畢登靈臺觀雲物尤為可證而但讀左傳前兩三句故顓以指冬至云閤下閣下之辨漢唐宋元稱閤下前眀稱閣下其義各不相蒙流俗不明閤閣之辨泥乎閣下之稱者漢唐宋元文集凡言閤盡讀為閣如邨塾師改韓柳文閤下為閣下是也泥乎閤下之稱者明朝人文集中凡言閣下漫改為閤如後人欲改歸太僕集閣下為閤下是也日知録有此一條言之甚詳備載於此不嫌覼縷也云趙璘因話録曰古者三公開閤郡守比古之侯伯亦有閤故世俗書題有閤下之稱漢書王尊𫝊直符史詣閤下從太守受其事前輩呼刺史太守亦曰節下與宰相大僚書往往稱執事言閤下之執事人耳劉子𤣥為史官與監修宰相書稱足下韓文公與使主張僕射音夜書稱執事此其例也若記室本繫王侯賓佐之稱他人亦非所宜執事則指其左右之人尊卑皆可通稱侍者則士庶可用之近日官至使府御史及畿令悉呼閤下至於初命賓佐猶呼記室今則一例閤下上下無别其執事纔施於舉人侍者止行於釋子而已今之布衣相呼盡曰閤下雖出於浮薄相戲亦是名分天壤矣又云謝在杭五雜俎言門夾室也以板為之禮記内則天子之閣左達五右達五蓋古人置此以庋音紀飲食之所即今房中之板閣而後乃廣之以為樓觀之通名如石渠天禄麒麟之類或以藏書或以繪音㑹象或以為登眺游覧之所閤者門旁小户也因設館於其旁即謂之閤漢書公孫𢎞𫝊開東閤以延賢人師古曰閤者小門也東向開之避當庭門而引賓客以别於掾史官屬如今官署角門旁有延賓館是也故蕭望之𫝊言自引出閤而雋前上聲不疑𫝊暴勝之為直指使者不疑至門勝之開閤延請是凡官府皆有閤不獨三公也韓延夀𫝊行去聲縣至髙陵入卧𫝊音戰舍閉閤思過如今之閉角門不聽官屬入也朱博傳召見功曺閉閤數責此又是閉角門不聽出也東晉太極殿有東西閤唐制倣之以宣政殿為前殿紫宸為便殿前殿謂之正衙天子不御前殿而御紫宸乃自正衙喚仗繇閤門而入百官候朝於衙者因隨以入見謂之入閤蓋中門不啓而開角門也爾雅小閨謂之閤而室中之門亦或用此為稱是則二字之義本自不同漢舊儀曰丞相聽事門曰黄閤不敢洞開朱門以别於人主故以黄塗之謂之黄閤今代以文淵閣藏書而大學士主之故謂之閣老蓋亦論經石渠挍書天禄之遺意爾然西京但有閣而未以為官曺之稱至後漢始謂之臺閣古詩為焦仲卿作云汝是大家子仕宦於臺閣陳夀三國志評曰魏世事統臺閣重内輕外故八座尚書即古六卿之任也裴松之三國志註引魏略曰薛夏為秘書丞嘗以公事移蘭臺蘭臺自以臺也而秘書署耳謂夏為不得移推使當有坐者夏報之曰蘭臺為外臺秘書為内閣臺閣一也何不相移之有蘭臺屈無以折自是之後遂以為常唐書職官志光宅元年九月改門下省為鸞臺中書省為鳯閣李肈國史補宰相相呼為堂老兩省相呼為閣老杜子美奉贈嚴八閣老詩云扈聖登黄閣困學紀聞曰給事中屬門下省開元曰黄門省故曰黃閣左拾遺亦東省之屬故曰官曺可椄聯又將赴成都草堂途中寄嚴鄭公詩云生理祗憑黃閣老此特借黄門為黄閣而亦夲於漢人臺閣之稱唐書楊綰𫝊故事舎人年久者為閣老然則今之内閣實夲於此而非取三公黄閤之義其言入閣辦事謂入此内閣爾而與唐之隨仗入閣不相蒙也閣下之稱猶云臺下古今異名亦何妨乎訂譌雜録卷九
