body:
  text: 訂譌雜錄卷一靑浦胡鳴玉撰褎然褎音又漢書董仲舒傳制曰今子大夫褎然為舉首朕甚嘉之注服䖍曰褎然盛服貌劉夢得詩俊骨英才氣褎然策名飛歩冠羣賢俗作裒蒲侯切然非策名委質左僖二十三年狐突曰策名委質貳乃辟也杜元凱注名書於所臣之策屈膝而君事之則不可以貳辟罪也陸德明釋文云質如字韻府云委質猶委身俗因曲禮有童子委摰與䞇同而退之文又以臣子有出疆載質之説讀作策名委䞇非附攷曲禮委䞇注童子不敢與成人為禮或見師友而執贄則奠委於地而自退避之也啇㩁商㩁音覺今作商搉非韓昌黎孟東野納涼聯句儒庠恣游息聖籍飽商㩁謂商訂揚㩁也廣韻注云揚㩁大舉莊子徐無鬼篇則可不謂有大揚㩁乎有寫作商𣙜亦非𣙜以木渡水今略彴是也漢𣙜酟唐𣙜茶謂禁民釀仰去聲酒擷茶官獨開置如道路設木為𣙜獨自取利也與揚㩁意無渉桺河東寄郴筆詩題内亦有令更商㩁語劻勷勷汝陽切讓平聲音穰與贊襄字音義不同劻勷􅇥遽貌杜牧之詩參軍與尉簿塵土驚劻勷一語不中治鞭笞身滿瘡昌黎劉統軍碑銘蔡卒幸喪圍我許郛新師不牢劻勷將逋劻亦作恇楚辭逢此世之恇勷又昌黎詩渾奔肆狂勷注云狂當作􅀈亦作劻劻勷急遽也故距躟為行遽􅀢鬤為髪亂皆以匡音為正靑浦縣志王洪州圻序云志可一日闕哉而志猶不果葺者百宂劻勷未暇也又云商㩁質訂可見前軰用字不茍密勿密勿不作秘密觧漢書劉向傳君子獨處守正不橈音閙衆枉勉強以從王事則反見憎毒讒愬故其詩曰密勿從事不敢告勞無罪無辜讒口嗸嗸詩作囂囂顔師古注密勿猶黽勉也又𫝊亮表密勿軍國心力俱盡少陵北征詩君誠中興主經緯固密勿周興嗣千字文亦有俊乂密勿多士實寧語竝觧黽勉惟柳子厚為李京兆祭楊郎中文密勿之謀唯道是履祭姊音止夫崔使君文密勿書奏元侯是俞似亦作秘密觧恐子厚失攷蕞爾蕞音萃蕞爾小貌左昭七年蕞爾國而三世執其政柄陸徳明曰蕞在最反俗誤讀撮爾以蕞與撮字形相似耳奕禩禩同祀商謂年為祀奕禩猶奕世也字从示从異俗从冀因誤讀奕冀周禮小祝之秀反有冦戎之事則保郊祀于社注云祀或作禩此禩與祀通用之一徴也泠然泠音靈泠然清泠意俗作冷然非莊子逍遙遊夫列子御風而行泠然善也沈佺期詩不能懐魏闕心賞獨泠然又人名唐詩人王泠然有古木卧平沙一律見試帖中逕庭逕庭音聽隔逺貌又激過也莊子逍遙遊吾驚怖其言猶河漢而無極也大有逕庭不近人情焉俗誤讀為家庭之庭數竒數竒音朔基漢李廣傳大將軍隂受上指以為李廣數竒毋令平聲當單于恐不得所欲注如淳曰數為匈奴所敗為竒不耦服䖍曰作事數不耦也師古曰數音所角反竒音居宜反柳子厚碑云不遇興詞鬱駹眉之都尉數竒見惜挫猿臂之將軍楊蟠詩云仲父嘗三逐將軍老數竒洪邁制詞云李廣數竒應恨封侯之相孟明一眚終酬拜賜之師皆遵漢書音義作疏數字用王維詩衞青不敗由天幸李廣無功因數竒邵氏聞見錄曰漢書音義數作朔則亦不可以對天矣其説良是又案范筠詩數竒不可偶性直誰能紆杜詩數竒謫關塞道廣存箕潁白詩集序云文士多數竒詩人尤命薄蘇詩數竒逢惡嵗計拙集枯梧竝作命數之數黄山谷謂師古注以數竒為命隻不耦乃命數之數非疏數之數也宋景文公筆錄謂得江南漢書本乃所具反傳寫誤以所具反為所角反耳去入二聲其用不同其説各異如此雋永雋永蒯通所著書名凡八十一首見漢書師古注雋音字兖反肥肉也永長也言其所論甘羙而義深長也元遺山詩雋永不羡大官羊二字人所習用而不究所出故詳之雋依顔氏音義當讀前上聲廣韻亦音徂兖切注云鳥肥也又姓漢有雋不疑稕韻中止收儁字而不收雋字則雋為前上聲無疑也而方密之通雅云公羊傳得雋曰克此語在左傳莊公十一年公羊傳中竝無此語後漢書朱雋後漢書作儁與俊同非雋也字公偉皆讀俊雋之音翦乃俊字之隨讀耳雋有翦音猶平有便音甄有堅音竣有全音也漢人注書雋翻字兖出自師古乃唐人非漢人也偶以方言注之後人别無所考遂據為定案耳案此則俊與翦二音又似不妨通讀然恐通雅之言考訂未精不足為據佔畢呫嗶不作唫諷觧亦非口旁禮學記今之教者呻其佔畢注佔視也畢簡也言今之教人者但吟諷其所佔視之簡牘不能通其縕奥案此書呫音帖竝無占音嗶聲出貌絶非誦讀意滑稽滑稽之滑俗誤讀猾史滑稽傳注崔浩曰滑音骨滑稽流酒器也轉注吐酒終日不已言出口成章詞不窮竭若滑稽之吐酒又漢書陳遵傳揚雄酒箴鴟夷滑稽腹大如壺師古曰滑稽圜轉縱舎無窮之狀二字見處甚多含毫邈然邈音漠陸士衡文賦或操觚以率爾或含毫而邈然率爾謂文之易成也邈然謂思之杳無所得也一易一難與上文所云或妥帖而易施或岨峿而難安一例不作文思深遠觧亦不音渺下文函綿邈於尺素是言文思深逺培塿培音剖塿樓上聲說文培塿小土山也揚雄方言冢俗混作冡非冡即䝉字秦晉間謂之培塿杜詩大守去聲頃者領山南邦人思之比父母音牡王生早曾拜顔色高山之外皆培塿白樂天青冡詩上有飢鴈號下有飛蓬走茫茫邊雪裏一掬沙培塿亦作部婁左襄二十四年太叔曰部婁無松栢陸徳明曰部蒲口反婁路口反二字人每誤讀平聲傴僂傴僂音禹旅左昭七年正考父佐戴武宣三命兹益共故其鼎銘云一命而僂再命而傴三命而俯韻本相協俗誤讀歐樓昌黎元和聖徳詩婉音苑婉弱子赤立傴僂牽頭曵足先斷􅆎膂皮日休詩九十擕鋤傴僂翁小園幽事盡能通白頭如新今人以白頭如新作乆而敬之情好不替解非漢鄒陽傳語曰有白頭如新傾蓋如故何則知與不知也謂不相知者雖頭白如新識相知者雖傾蓋間如舊識也故孟康注曰初相識至白頭不相知口占口占去聲借音戰漢陳遵傳治私書謝京師故人遵馮几音紀口占書吏注謂占隱度也口隱其詞以授吏也又朱博傳口占檄文師古竝音之贍反詩題用此乃不起草之義不作平聲讀唐王劇音極當五王出閤劇召五吏分占其詞粲然東漢虞延占拜可觀分占分其口占而書之也占拜可觀拜起致詞有儀度也陰氏以分占占拜收入平聲誤也口號詩題用口號字近見注杜詩者於紫宸殿退朝口號等題輒作平聲謂隨口號吟也説似近理然李義山詩柏臺成口號雲閤暫肩隨昌黎詩五言出漢時蘇李首更號東都漸瀰漫派别百川導號乃名稱之義非號吟也又王摩詰凝碧池詩題云私成口號誦示裴迪若作平聲於解不通度曲度曲之度有去入二聲漢書元帝贊鼔琴瑟吹洞簫自度曲被歌聲如淳曰自隱度作新曲因持新曲以為歌詩聲也師古曰度音大各反案此與古文苑宋玉笛賦度曲羊腸竝音鐸張平子西京賦度曲未終杜去聲乃度次之度謂曲終更授其次也二者音義迥别臣瓚引西京賦以證漢書西京注亦引元帝自度曲為證皆非也今人但知為度次之義而不復去聲知有隱度之説兆眹眹从目廣韻注云目童子也又吉凶形兆謂之兆眹今作朕且倒拈曰朕兆沿誤已乆無由革也野客叢書論漢再受命之兆云漢再受命已兆眹於景帝生長沙定王發之際矣又云生長沙定王之時已萌芽漢再受命之象又非所以為兆眹也兆眹之時其見於程姬所避之際乎古人用字無或誤者蔕芥今謂人之事過不畱胷無凝滯者曰無芥蔕予案出處乃是蔕芥非芥蔕蔕釵去聲音蠆與音戴音帝作𤓰底解不同漢賈誼傳細故蔕芥何足以疑師古曰蔕芥小鯁亦作梗也蔕音丑芥反相如子虛賦吞若雲夢者八九其於胷中曾不蔕芥注刺鯁也史記賈誼傳作細故慸葪韋昭曰蔕音士介反索音色隱曰葪音介觀此則蔕之讀蠆昭然也故郭向莊子注直作蠆芥又張衡西京賦睚眦蠆芥東坡詩坐看青丘吞夢芥自慙黃潦薦溪蘋又靑丘已吞雲夢芥藝苑雌黃謂出處是曾不蔕芥非草芥之芥譏坡錯拈耑耑古端字考工記磬氏已下則摩其耑漢蓺文志感物造耑材知深美俗誤作專字用案子史專字多作顓豈以耑為顓之省文故沿誤不覺耶圖今之某啚即古之某里啚本作圖日知錄云宋時登科錄必書某縣某鄉某里人蕭山縣志曰改鄉為都改里為圖自元始嘉定縣志曰圖即里也不曰里而曰圖者以每里册籍首列一圖故名曰圖是矣今俗省作啚玉案廣韻啚嗇也與鄙同匪頒匪頒之匪音分如字讀者非周禮廩人掌九穀之數以待國之匪頒注匪讀為分分匪謂委人之職諸委去聲積也又太宰八曰匪頒之式九曰好用之式注匪分也頒謂班賜也王所分賜群臣也好用燕好所賜予一倡三歎樂記清廟之瑟朱絃而疏越一倡而三歎有遺音者矣注練朱絲以為絃絲不練則聲清練之則聲濁疏通也越瑟㡳孔也疏而通之使其聲遲緩瑟聲濁而遲是質素之聲非要妙之音也此聲初發一倡之時僅有三人從而和之言和者少也以其非極聲音之美故好者少然其中有不盡之餘音存焉故曰有遺音者矣朱子曰一倡而三歎謂一人倡而三人和今解者以為三歎息非也經子倡歎倡和之倡多从人不从口邁種書臯陶邁種德德乃降邁勇往力行之意種布也言臯陶勇往力行以布其德也張衡賦咎繇邁而種德兮今人稱跨竈之子輒曰邁種呼種為上聲作超越種類解别無證據豈非誤歟近時名流四六亦踵此弊憺園賦云傳家而望本駒王邁種而人呼麟子注家引邁種德釋之非也跨竈意應曰邁迹字見周書蔡仲之命傳云叔違王命仲無所因故曰邁迹自身芒種芒種知隴反音腫今人呼去聲宜誤解其義而不覺耳周禮稻人澤草所生種去聲之芒種注云芒種稻麥也郭璞江賦播匪藝之芒種挺自然之嘉蔬注云藝樹也芒種稻麥也觀此二則其義了然又嬾眞子錄云襄鄧之間多隱君子嘗記陜州夏縣士人樂舉明遠嘗云二十四氣其名皆可解獨小滿芒種説者不一僕因問之明遠曰皆為麥也小滿四月中謂麥之氣至此方小滿而未熟也芒種五月節種該數類之種謂種之有芒者麥也至是當熟矣玉按此解芒種義甚明但專指麥言非也予謂芒種為五月節麥至是而熟可収稻過是而不可藝古人以此二字名節所以告農候之早晚也邁種音衆俗誤呼上聲芒種音腫俗誤呼去聲二弊正相反故連類錄之謏聞學記發慮憲求善良足以謏聞不足以動衆謏聞音小問謏小也發慮憲謂致其思慮以求合乎法則求善良親賢也言此二者可以小致聲譽不能感動衆人俗多誤讀甚有誤用作諛聞者弋人何篡篡弋取也弋人何篡語出揚子法言今本譌作何慕人襲用之非也後漢逸民傳序云揚雄曰鴻飛冥音明冥弋人何篡焉注宋􅇆曰篡取也鴻高飛冥冥薄音博天雖有弋人何施巧而取也又陳子昻碑曰弋人何篡鴻飛高雲韓昌黎酬崔十六少府詩云肯效屠門嚼久嫌弋者篡謀拙日焦拳活訃似鋤剗古無誤作慕者梅邨吳祭酒白燕吟序云吾友單狷菴隱居其旁鴻飛冥冥為弋者所篡乃知博雅君子必不肯茍同於俗也又案三山老人云法言弋人何慕焉一本作纂故退之詩云肯效屠門嚼久嫌弋者纂玉謂此説大非纂上聲字與此詩去聲韻不協韓集可攷也落魄落魄音託又音薄史漢酈食其音歴異基傳好讀書家貧落魄應劭曰志行衰惡之貌師古曰失業無次也晉灼曰落魄落託義同唐高駢詩未出塵埃眞落魄不趨權勢正因循此以落魄對因循元遺山詩落魄宜多病艱危更百憂此以落魄對艱危宋處士楊朴被召其妻送詩曰更休落魄貪杯酒亦莫猖狂愛詠詩今日捉將官裏去這回斷送老頭皮此以落魄對猖狂歴觀數則其義自明若杜牧之落魄江湖載酒行一絶尤為豪放乃知落魄為放蕩失檢之意非淪落不堪也又陳書杜稜少落泊不為當世所知晉佛圖澄傳鈴聲曰胡子洛度又大安童謠元超兄弟大落度世説王耆之樂託出自門風其義相同詩中落魄二字見處甚多竝作雙疉字用拓落漢揚雄傳位不過侍郎擢纔給事黃門意者𤣥得毋尚白乎何為官之拓落也注云拓落不耦也俗倒拈曰落拓用為放蕩失檢意非放蕩失檢應作落魄如今人云落魄不羈是也説詳前條或作樂託亦可世説謝中郎云王修載樂託之性出自門風大較較然大較大畧也較音角史貨殖傳此其大較也又著明貌史伯夷傳此其尤大彰明較著者也漢霍光傳較然甚明後漢張衡傳情僞較然與獵較音同與計較音異又案史記律書豈與世儒闇於大較注索隱曰較音角左襄二十一年杜注較然正直陸氏曰較音角載籍音義甚明俗不契勘混讀教音搶攘搶攘音撐能漢賈誼傳國制搶攘晉灼曰搶攘亂貌搶音傖攘音女庚反韻府以此二字入庚韻不入養韻有以也俗如字讀非近時名流四六云笳吹郭外驚蟻陣之縱橫燧暗山中駭狐鳴之搶攘亦誤從俗音索解人不得世説阮裕作白馬論以示謝安於時謝不即解阮語重相咨盡阮乃歎曰非但能言人不可得正索音色解人亦不可得索解人三字本連與能言人一例謂求解其義也今用作求一能解之人不可得意非訂譌雜錄卷一
