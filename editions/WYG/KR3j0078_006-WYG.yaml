body:
  text: 訂譌雜録卷六青浦胡鳴玉撰斷章俗讀斷章如論斷之斷心謂其非近見夢溪筆談亦曾辨之乃知字音紕繆古今一轍也其言曰古人引詩多舉詩之斷章斷音段讀如斷截之斷所謂如一詩之中只斷取一章或一二句取義不全取全篇之義故謂之斷章今之人多讀為斷章斷音鍛殊誤也此説先得我心惜其未疏明斷章二字出處耳左襄二十八年盧蒲癸曰宗不余辟余獨焉辟之賦詩斷章余取所求焉惡識宗杜注言已茍欲有求於慶氏不能復去聲顧禮譬如賦詩者取其一章而已陸徳明曰斷音短玉案字書凡物自然判絶則團上聲又去聲截之使斷音短然則斷章又應讀上聲為短音也雍州雍州之雍去聲與雍和平聲不同左傳雍字凡屬地名陸徳明必音於用反孟浩然詩縣城南面漢江流江嶂開成南雍州沈亞之詩何處春暉好偏宜在雍州李義山詩離思覊愁日欲晡東周西雍此分途東坡詩聊興廣武歎不待雍門彈朱文公詩從知爽鳩樂莫作雍門哀又幷州音氷元遺山詩後夜相思渺何許西山西畔是幷州樂翁晉衛玠娶樂廣女裴叔道曰妻父有氷清之姿壻有玉潤之望所為秦晉之匹也後世稱婦翁為樂翁本此猶稱叔曰大阮姪曰小阮之類後譌作岳因傅會其説謂泰岳有文人峯故稱岳父又稱泰山歐陽公云今人呼妻父為岳公以泰山有丈人峯又呼妻母為泰水不知出何書也豈知丈人為長老通稱去聲非必外舅也且以丈人名山不獨泰岱黄帝時封青城山為五嶽丈人故少陵有丈人山詩雜俎載唐明皇東封以張説為封禪使及已三品以下皆轉一品説以壻鄭鎰官九品因説遷五品元宗怪而問之鎰不能對黄番綽對曰泰山之力也此因封泰山而得官故云然竝非以泰山為外舅後世或因此而𫝊譌亦未可知丈人妻之父為外舅母為外姑見爾雅釋名諸書世以外舅為丈人雖非泰山丈人峯之謂然其來亦久三國志裴松之元嘉時人注獻帝舅車騎将軍董句下謂古無丈人之名故謂之舅栁子厚與外舅楊憑書丈人以文律通流當世又曰丈人旦夕歸朝廷復去聲為大僚又祭楊憑文子壻謹以清酌庶羞之奠昭祭於丈人之靈陳後山送外舅詩丈人東南英今人與外舅詩文中罕用之矣子厚集更有祭獨孤氏丈母文丈母之稱尤為近俗令弟古人自稱弟妹曰令若出今人當作一笑謝靈運酬從弟恵連詩末路值音穉令弟開顔披心胸杜少陵乗雨入行軍六弟宅詩令弟雄軍佐凡才汚去聲省郎送從弟亞去聲赴河西判官詩令弟草中來蒼然請論平聲事送鄉弟韶詩令弟尚為蒼水使名家莫出杜陵人李頎放歌行荅從弟異卿云吾家令弟才不覊五言破的人共推陶淵明祭程氏妹云咨爾令妹有徳有操夫君古人稱友曰夫君孟浩然遊精思觀迴王白雲在後詩云衡門猶未掩佇立望夫君李義山雨中送趙滂不及詩云秋水緑蕪終盡分夫君太騁錦障泥皮日休送蠏與魯望詩云病中無用霜􅢗音翺處寄與夫君左手持又懐茅山廣文南陽博士詩云誰道夫君無伴侣不離窻下見羲皇昌黎祭李使君文美夫君之為政不橈音鬧志於讒構此類甚多一時不盡記憶也案此二字本自通稱九歌思夫君兮太息指雲中君也思夫君兮未來指湘君也世俗但知婦目所天用也縣官漢時稱天子曰縣官東平王𫝊縣官年少霍光𫝊縣官非我家将軍不得至是後漢劉盆子𫝊當為縣官何故為賊此類甚多若平準書衣食皆仰去聲給縣官貴粟論使天下入粟縣官之類此不指天子言道人唐宋人詩稱僧多曰道人人或不曉其故葉石林避暑錄云晉宋間佛學初行其徒猶未有僧稱去聲通曰道人玉案世説竺法深在簡文座劉尹問道人何以游朱門答曰君自見其朱門貧道如游蓬戸又支道林常養數匹馬或言道人畜馬不韻支曰貧道重其神駿人稱曰道人自稱曰貧道今世惟羽流如此不以施之比丘三鱣後漢楊震𫝊有冠雀銜三鱣魚飛集講堂前都講取魚進曰蛇鱣者與蛇連類言自應作去聲卿大夫服之象也數三者法三台也先生自此升矣注云冠音貫即鸛雀也鱣音善似蛇一作鱓卿大夫之服象也郭璞云鱣魚長二三丈音知然反玉案此即鱣鮪之鱣江東呼為黄魚少陵詩所謂頓􅉐食黄魚脂膏兼飼犬長大不容身者是也今謂之鱘鰉魚安有鸛雀能勝二三丈乎此其為鱓明矣太子賢説如此予歴覽古今辨證書均謂三鱣應讀鱓世俗平聲用者誤葢遵後漢注音也然少陵秋日䕫府詠懐寄鄭監李賓客百韻詩敕厨惟一味求飽或三鱣押入先韻則讀為専音亦未可盡非呉曾漫録曰以楊震碑考之則云貽我三魚以辨懿徳稱鱓未必得其真也六經史儒林𫝊申公獨以詩經為訓以教楊用脩曰六藝以經稱始於禮記經解再見於此予案禮記經解二字係後人名篇夫子語中竝無經字葢夫子時未以經名也又莊子天運篇孔子謂老聃曰邱治平聲詩書禮樂易春秋六經自以為久矣孰知其故矣以奸音干者七十二君又曰夫六經先王之陳迹也夫子已自稱經然此莊周寓言不可為據有味其言漢鄭當時𫝊其推轂士及官屬丞史誠有味其言也師古曰推轂言薦舉人如車轂之運轉也有味者其言甚美也今人引用作有味乎其言之增一乎字之字便失其解不得名一錢漢鄧通𫝊沒入通家尚負責數鉅萬長公主賜鄧通吏輒隨沒入之一簪不得著身於是長公主乃令假衣食竟不得名一錢寄死人家師古曰公主給其衣食也而號曰假借之耳非通自有也恐吏沒入故託云然此所謂不得名一錢也今人作文譽人淡於貨利輒曰生平不名一錢若王夷甫口不言錢故事豈非錯解即或用為一錢不有意與本指無悖然係不祥語安得以此謂人曉人不當如是耶漢薛廣徳𫝊元帝酹祭宗廟出便門欲御樓船廣徳請從橋且曰陛下不聴臣臣自刎以血汚車輪陛下不得入廟矣上不恱張猛曰臣聞主聖臣直乗船危乗橋安聖主不乗危御史言可聴上曰曉人不當如是耶本謂以言曉喻人者當如猛之和婉音苑正以廣徳之言為戅激也今俗引用以曉人為通曉道理之人則失其解矣此正與第一卷所言誤用索解人不得句同又容齋四筆曰元帝之詔本是褒音包嘉之詞猶云獨不當如是耶今乃指人引喻非理或直述其私曰曉人不當如是宴爾誕彌經𫝊中事實多有轉相祖述而用初不考其訓故者如􅆁谷風之詩為淫新昏棄舊室而作其詞曰宴爾新昏以我御窮宴安也言安愛爾之新昏但以我御窮苦之時至於富貴則棄之今人乃以初昏為宴爾非唯於詩意不合且又再娶事豈堪用也生民之詩曰誕彌厥月毛公曰誕大也彌終也鄭箋言后稷之在其母終人道十月而生案訓彌為終其義亦未易曉至俾爾彌爾性似先公遒矣既釋彌為終又曰酋終也頗涉煩複生民凡有八誕字誕置之隘巷誕置之平林誕置之寒氷誕實匍匐誕后稷之穡誕降嘉種誕我祀如何若悉以誕為大於義亦不通它如誕先登于㟁之類新安朱氏以為發語之辭是已莆田鄭氏云彌止訓滿謂滿此月耳今稱聖節曰聖誕曰誕節人相稱曰誕日誕辰慶誕皆為不然但承習膠固無由可革雖東坡公亦云仰止誕彌之慶未能免俗書之於此使子弟後生輩知之説見容齋隨筆王𤓰生記月令孟夏之月王瓜生苦菜秀王瓜草名非瓜也故自來類書未有以此誤𨽻瓜門者禮記集説云此記已月之候王瓜注云草扶歴反挈本草作菝步末反葜音同謂之瓜者以根之似也亦可釀酒朱氏曰王瓜色赤感火之色而生苦菜味苦感火之味而成玉曾見辨證書謂西瓜至五代始入中國文選浮甘瓜於清泉葢指王瓜甜瓜之類欲證甘瓜之非西瓜而以草名為瓜其謬不更甚乎雙鯉魚漢世書札相遺去聲多以絹素疊成雙魚之形古詩云尺素如霜雪疊成雙鯉魚要知心裏事㸔取腹中書此明徴也後人因漢書陳勝𫝊云迺丹書帛曰陳勝王置人所􅊻魚腹中卒買魚烹食得書云云又因沈約宋書符瑞志曰黄帝之世魚流於海得圗書馬遂謂古人真於魚腹中寄書可笑其愚凡詩人言書問往來必曰魚鴈皆假託之言耳若認為真魚蘇武上林鴈足之帛豈為實事乎狡獪老學菴續筆記云王方平曰吾子不戲作狡獪事葢古語謂戲為狡獪列異𫝊云北地𫝊書小女折花作䑕以狡獪是也今閩人謂兒戲為狡頑葢本於此或以姦猾為狡獪則失之玉案世説袁彦伯作名士𫝊成見謝公公笑曰我嘗與諸人道江北事特作狡獪耳彦伯遂以箸世説著皆作箸説見第三卷書古人謂戲為狡獪觀此益信爛漫今人目物之燦爛者曰爛熳非也案字書無熳字止合作爛漫淋漓衆多也如杜韓詩爛漫倒家釀衆雛爛漫睡爛漫通經術爛漫忽無次爛漫堆衆雛爛漫長醉多文辭之類不可殫述也凡古人詩文集爛漫作熳竝係後人𫝊寫之譌開元錢後人以開元錢為唐明皇朝始鑄之非也日知録云自宋以後皆先有年號而後有錢文唐之開元則先有錢文而後有年號舊唐書食貨志曰武徳高祖年號四年鑄開元通寶錢徑八分重二銖音殊四絫積十錢重一兩又曰開元錢之文給事中歐陽詢制詞及書時稱其工其字含八分及𨽻體其詞先上後下次左後右讀之自上及左迴環讀之其義亦通流俗謂之開通元寶錢馬永卿曰開元通寶葢唐二百八十九年獨鑄此錢雒幷平聲幽桂等處皆置監故開元錢如此之多而明皇紀號偶相合耳玉案此唐時止鑄開元通寶錢特迴環其文讀之曰開通元寶耳畫墁録謂高祖武徳初鑄開通元寶錢亦曰開元通寶錢其説非是而後世耳食者遂據此為辨證之資謂唐時止有開通元寶錢而後人讀為開元通寶者誤豈唐書食貨志反不足據耶又野客叢書云開元錢鑄於累朝所以至今尚多容齋隨筆亦嘗言之一杯土野客叢書云駱賓王代李敬業檄斥武后云一抔之土未乾六尺之孤安在一抔土字正用前漢書張釋之所謂盗長陵一抔土事據注步侯切乃裒音今人不曉者讀為杯盞之杯僕觀歐陽行周集有或掬一杯土焉或翦一枝材焉劉禹錫詩血汚去聲城西一杯土歐陽詢藝文類聚於杯門編入長陵一杯土事是知明以抔字為杯􅀢字用矣僕又考之古詞中有以酒杯作抔土字押者如隴西行是也因知古人嘗以此二字通用勉夫辨證洞徹源流大率類此子見今人有用作一坏土者此不學之故一介行李一介音箇左襄八年亦不使一介行李告於寡君注一介獨使也行李行人也陸徳明曰介古賀反行李亦作行理昭十三年行理之命無月不至國語周之秩官有之曰敵國賓至闗尹以告行理以節逆之後世以行装為行李嬾真子録墨客揮犀音西皆言其非秦誓如有二介臣大學引作一个臣則一介行李應讀一个行李無疑也古人音釋精當如是槃礴莊子田子方篇晝史解衣槃亦作盤礴臝槃礴箕踞也臝與裸同今或引用作解衣磅礴非截去臝字亦失本指萱堂今人稱母為北堂萱葢祖毛詩伯兮詩焉得諼草言樹之背注諼草令人忘憂背北堂也其意謂君子為王前驅過時不返家人思念之切安得諼草種於北堂以㤀其憂葢北堂幽陰之地可以種萱初未嘗言母也不知何以遂相承為母事借問北堂幽陰之地則凡婦人皆可以言北堂矣何獨母哉説本野客叢書予案儀禮士昏禮婦洗在北堂或因此訛以北堂屬婦人然於母事終無涉也高唐神女夢古今詞人多以巫山雲雨之夢屬之楚襄王其實非也宋玉高唐賦所謂昔者先王嘗遊高唐怠而晝寢夢見一婦人曰妾巫山之女願薦枕席旦為行雲暮為行雨朝朝暮暮陽臺之下叶戸云云則始之夢神女者為懐王神女賦所謂楚襄王與宋玉遊雲夢使玉賦高唐之事其夜玉寢夢與神女遇其狀甚麗玉異之明日以白王王曰其夢若何云云則繼之夢神女者為宋玉襄王元未嘗夢也文選刻本舊於神女賦其夜玉寢及玉異之玉對曰晡夕之後玉曰茂矣美矣諸處玉字皆譌作王於明日以白王王曰其夢若何王曰狀如何也諸處王字皆譌作玉所以謂之襄王夢耳明日以白王作白玉既無以君白臣之理且於下文王曰若此盛矣試為寡人賦之處文理不通檢閲元本應自知之容齋随筆亦謂襄王既使玉賦高唐之事其夜王寢夢與神女遇則是王父子皆與此女荒淫近於聚麀之醜矣後人譏其失言葢神女之夢寓言諷主不特不得誤屬襄王即懐王宋玉之夢亦本子虚烏有杜少陵詩雲雨荒臺豈夢思李義山詩襄王枕上元無夢莫枉陽臺一片雲是也款識漢郊祀志鼎大異於衆鼎文鏤無款識又張敞上議曰今此鼎細小又有款識不冝薦於宗廟師古曰款刻也識記也音式志反史封禪書注韋昭曰款刻也索隠曰識猶表識周夢𤾉云博古圗古器俱有款識款謂陰字是凹入者識謂陽字是凸出者款在外識在内夏器有款有識商器無款有識識音志今人讀款識如見識之識已謬而又有以器物形象為款制者尤謬食酒漢于定國𫝊定國食酒至數石不亂如淳曰食酒猶言喜酒也師古曰食酒謂能多飲酒費盡其酒猶云食言玉案栁河東序飲云予病痞不能食酒至是醉焉本之漢書宋丘昶賓朋宴語亦有臣聞食酒極好不假藥餌足以安心神之語王勉夫曰如淳謂喜酒固已無謂師古又引食言之食可笑其迂也論語沽酒市脯不食此言食酒雖因脯而幷言然酒之言食亦不可謂無所祖矣又曰漢斛雖小安有一人飲至數石之理足見其妄又王元美曰食酒能多飲費盡之也蘇子赤壁賦真本書末用食字韻出此玉檢蘇帖果然今本作我與子所共適文移字様屢見辨證書言俗吏於文移中用字之譌如槍刀之槍作鎗音撑鼎屬卓倚作棹椅足彀為足勾之類不可枚舉予謂莫甚於誤價直為價值音穉侵占為侵佔音沾也洵洵音荀信也本平聲字今之作詩者用作仄聲觸目皆是與第三卷所言纍纍讀壘壘之誤同此固淺近字音不足置辨因俗多誤呼聊一及之處州王勉夫曰聞見録謂徳宗立議改括州適處士星應括州分去聲野遂改為處州合上聲呼呼去聲非也容齋隨筆謂嚴州本名睦州宣和中以方㓂改嚴州葢取嚴陵灘之意子陵乃莊氏避帝諱以莊為嚴合為荘州訂譌雜録卷六
